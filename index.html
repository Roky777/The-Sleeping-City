        drawGenBArc() {
          this.genB.arcG.clear();
          if (this.genB.active) return;
          this.genB.arcG.fillStyle(
            0x3377ff,
            Phaser.Math.FloatBetween(0.3, 0.7),
          );
          this.genB.arcG.fillRect(
            this.genBZone.x1,
            this.gY - 6,
            this.genBZone.x2 - this.genBZone.x1,
            8,
          );
          for (let i = 0; i < 4; i++) {
            let sx = Phaser.Math.Between(
              this.genBZone.x1 + 20,
              this.genBZone.x2 - 20,
            );
            this.genB.arcG.fillStyle(0x88bbff, 0.18);
            this.genB.arcG.fillCircle(sx, this.gY - 2, 16);
          }
        }

        // Draws the timing gate — red when hazardous, green/clear when safe
        drawGenCGate(t) {
          this.genC.gateG.clear();
          let frac = (t % this.genC.cycleLen) / this.genC.cycleLen;
          let safe = frac < this.genC.safeFrac;
          this.genC.safeNow = safe;
          let w = this.genCZone.x2 - this.genCZone.x1;
          if (!this.genC.active) {
            this.genC.gateG.fillStyle(0xff3333, 0.35);
            this.genC.gateG.fillRect(this.genCZone.x1, this.gY - 60, w, 60);
            return;
          }
          if (safe) {
            this.genC.gateG.fillStyle(0x33ff88, 0.12);
            this.genC.gateG.fillRect(this.genCZone.x1, this.gY - 60, w, 60);
          } else {
            this.genC.gateG.fillStyle(0xff3333, 0.45);
            this.genC.gateG.fillRect(this.genCZone.x1, this.gY - 60, w, 60);
            // crackling arcs
            for (let i = 0; i < 3; i++) {
              let sx = Phaser.Math.Between(
                this.genCZone.x1 + 10,
                this.genCZone.x2 - 10,
              );
              this.genC.gateG.fillStyle(0xffaa33, 0.5);
              this.genC.gateG.fillCircle(
                sx,
                this.gY - Phaser.Math.Between(10, 50),
                4,
              );
            }
          }
        }

        // ── The Heart Machine — dormant centerpiece ────────────────────
        buildHeartMachine() {
          let hx = this.heartX,
            hy = this.gY - 130;

          // Outer ring + body, drawn so it can be re-tinted/glowed on activation
          this.heartG = this.add.graphics().setDepth(8);
          this.heartGlowG = this.add.graphics().setDepth(7);
          this.heartPulse = 0;
          this.drawHeart(0);

          // Large cables connecting the machine to the chamber's power grid
          this.add
            .image(hx - 140, this.gY, "pipe_vertical2")
            .setOrigin(0.5, 1)
            .setDisplaySize(34, 220)
            .setDepth(6)
            .setTint(0x2a3344);
          this.add
            .image(hx + 140, this.gY, "pipe_vertical4")
            .setOrigin(0.5, 1)
            .setDisplaySize(34, 220)
            .setDepth(6)
            .setTint(0x2a3344);

          // Lever — appears interactable once the gate opens
          this.leverImg = this.add
            .image(hx - 60, this.gY - 4, "switch_green_off")
            .setOrigin(0.5, 1)
            .setDisplaySize(64, 70)
            .setDepth(9);
          this.add
            .image(hx - 60, this.gY - 80, "panel_orange1")
            .setOrigin(0.5, 1)
            .setDisplaySize(90, 100)
            .setDepth(8)
            .setAlpha(0.85);
        }

        drawHeart(charge) {
          let hx = this.heartX,
            hy = this.gY - 130;
          let pulse = (Math.sin(this.heartPulse) + 1) / 2;

          this.heartGlowG.clear();
          let glowA = 0.04 + 0.22 * charge * (0.6 + 0.4 * pulse);
          this.heartGlowG.fillStyle(0xd4780a, glowA);
          this.heartGlowG.fillCircle(hx, hy, 230);
          this.heartGlowG.fillStyle(0xe89030, glowA * 1.4);
          this.heartGlowG.fillCircle(hx, hy, 140);

          this.heartG.clear();
          // Outer housing
          this.heartG.fillStyle(0x1c222e, 1);
          this.heartG.fillCircle(hx, hy, 150);
          this.heartG.lineStyle(6, 0x33394a, 1);
          this.heartG.strokeCircle(hx, hy, 150);
          // Ribbed rings
          this.heartG.lineStyle(3, 0x2a3140, 1);
          this.heartG.strokeCircle(hx, hy, 120);
          this.heartG.strokeCircle(hx, hy, 90);
          // Core — glows orange once charged
          let coreColor = charge > 0 ? 0xe89030 : 0x3a3f4c;
          let coreA = charge > 0 ? 0.5 + 0.5 * pulse * charge : 1;
          this.heartG.fillStyle(coreColor, coreA);
          this.heartG.fillCircle(hx, hy, 55);
          this.heartG.fillStyle(
            0xffd080,
            charge > 0 ? 0.3 + 0.5 * pulse * charge : 0,
          );
          this.heartG.fillCircle(hx, hy, 30);
          // Radiating "vein" lines
          for (let i = 0; i < 8; i++) {
            let ang = (i / 8) * Math.PI * 2;
            let x1 = hx + Math.cos(ang) * 60,
              y1 = hy + Math.sin(ang) * 60;
            let x2 = hx + Math.cos(ang) * 145,
              y2 = hy + Math.sin(ang) * 145;
            this.heartG.lineStyle(
              2,
              charge > 0 ? 0xc8701e : 0x2a3140,
              charge > 0 ? 0.5 : 0.7,
            );
            this.heartG.beginPath();
            this.heartG.moveTo(x1, y1);
            this.heartG.lineTo(x2, y2);
            this.heartG.strokePath();
          }
        }

        createPlayer() {
          this.player = this.add
            .sprite(this.respawnX, this.gY, "stand")
            .setDepth(60);
          setPlayerAnim(this.player, this, "stand");
        }

        setAnim(name) {
          setPlayerAnim(this.player, this, name);
        }

        // Queue-based caption system (mirrors CityScene)
        showText(text, duration, callback) {
          if (!this.textQueue) this.textQueue = [];
          if (duration == null) duration = Math.max(2000, text.length * 65);
          this.textQueue.push({ text, duration, callback });
          if (!this.textActive) this._playNextText();
        }

        _playNextText() {
          if (!this.textQueue || this.textQueue.length === 0) {
            this.textActive = false;
            return;
          }
          this.textActive = true;
          let { text, duration, callback } = this.textQueue.shift();
          let t = this.add
            .text(W / 2, H - 29, text, {
              fontFamily: "EB Garamond",
              fontStyle: "italic",
              fontSize: "19px",
              color: "#ffffff",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(610)
            .setAlpha(0);
          this.tweens.add({
            targets: t,
            alpha: 1,
            duration: 700,
            onComplete: () => {
              this.time.delayedCall(duration, () => {
                this.tweens.add({
                  targets: t,
                  alpha: 0,
                  duration: 620,
                  onComplete: () => {
                    t.destroy();
                    if (callback) callback();
                    this._playNextText();
                  },
                });
              });
            },
          });
        }

        showPrompt(text) {
          if (this.interactPrompt) this.interactPrompt.destroy();
          let sx = this.player.x - this.cameras.main.scrollX;
          let sy = this.player.y - PLAYER_H - 22;
          this.interactPrompt = this.add
            .text(sx, sy, text, {
              fontFamily: "EB Garamond",
              fontSize: "14px",
              color: "#aabbcc",
              backgroundColor: "#00000099",
              padding: { x: 8, y: 4 },
            })
            .setOrigin(0.5)
            .setDepth(320)
            .setScrollFactor(0);
        }

        hidePrompt() {
          if (this.interactPrompt) {
            this.interactPrompt.destroy();
            this.interactPrompt = null;
          }
        }

        // Lightweight "failure" — brief flash + instant reset, no long death
        // sequence. Per spec: pits/shocks should teach, not punish.
        quickRespawn(message) {
          if (this.isDead) return;
          this.isDead = true;
          this.isFrozen = true;
          this.hidePrompt();
          this.pVY = 0;
          this.setAnim("stand");

          // Shock flicker — sustained jolt while the player is stuck in the current
          this.cameras.main.shake(2400, 0.01);
          let shockG = this.add.graphics().setScrollFactor(0).setDepth(700);
          let shockTimer = this.time.addEvent({
            delay: 80,
            repeat: 29, // ~2.4s of flickering
            callback: () => {
              shockG.clear();
              shockG.fillStyle(0x88bbff, Phaser.Math.FloatBetween(0.08, 0.2));
              shockG.fillRect(0, 0, W, H);
            },
          });

          if (message) this.showText(message, 2200);

          this.time.delayedCall(2600, () => {
            shockG.destroy();
            this.cameras.main.fade(500, 0, 0, 0);
            this.time.delayedCall(500, () => {
              this.scene.restart({ music: this.passedMusic });
            });
          });
        }

        groundYAt(px) {
          // Generator A gap section
          if (
            px > this.genA.pillars[0].x1 - 10 &&
            px < this.genA.sectionEnd + 10
          ) {
            for (let i = 0; i < this.genA.pillars.length; i++) {
              let p = this.genA.pillars[i];
              if (px > p.x1 && px < p.x2) {
                if (i === 1 && this.genA.active) {
                  let frac =
                    (this.genA.flickerCycle % this.genA.flickerLen) /
                    this.genA.flickerLen;
                  if (frac >= this.genA.flickerOnFrac) return null; // retracted
                }
                return p.top;
              }
            }
            for (let pit of this.genAPits) {
              if (px > pit.x1 && px < pit.x2) return null;
            }
          }
          return this.gY;
        }

        movePlayer(delta) {
          if (this.isFrozen) return;
          let dt = delta / 1000;
          let px = this.player.x,
            py = this.player.y;
          let wasOnGround = this.onGround;

          this.pVY += this.gravity * dt;
          py += this.pVY * dt;

          let groundY = this.groundYAt(px);

          if (groundY !== null && py >= groundY) {
            if (!wasOnGround && this.pVY > 200) {
              this.isLanding = true;
              this.setAnim("land");
              this.player.once("animationcomplete", () => {
                this.isLanding = false;
              });
            }
            py = groundY;
            this.pVY = 0;
            this.onGround = true;
          } else {
            this.onGround = false;
          }

          let moving = false;
          if (!this.isLanding) {
            if ((this.cursors.left.isDown || this.wasd.A.isDown) && px > 25) {
              px -= this.speed * dt;
              this.player.setFlipX(true);
              moving = true;
            }
            if (this.cursors.right.isDown || this.wasd.D.isDown) {
              px += this.speed * dt;
              this.player.setFlipX(false);
              moving = true;
            }
            if (
              (this.cursors.up.isDown ||
                this.cursors.space.isDown ||
                this.wasd.W.isDown) &&
              this.onGround
            ) {
              this.pVY = -390;
              this.setAnim("jump");
            }
          }

          if (!this.isLanding) {
            if (!this.onGround) {
              this.setAnim(this.pVY < 0 ? "jump" : "fall");
            } else if (moving) {
              this.setAnim("run");
            } else {
              this.setAnim("stand");
            }
          }

          // Falling through a Generator A pit
          if (
            px > this.genA.pillars[0].x1 - 10 &&
            px < this.genA.sectionEnd + 10
          ) {
            this.genAPits.forEach((pit) => {
              if (px > pit.x1 + 4 && px < pit.x2 - 4 && py >= this.gY - 8) {
                this.quickRespawn("Careful — the ground here is unstable.");
              }
            });
          }

          // Generator B electrified zone — live unless within the safe window
          if (
            (!this.genB.active || this.genB.safeWindow <= 0) &&
            px > this.genBZone.x1 + 4 &&
            px < this.genBZone.x2 - 4 &&
            py >= this.gY - 6
          ) {
            this.quickRespawn("The current bites.");
          }

          // Generator C timing gate
          if (
            this.genC.active &&
            !this.genC.safeNow &&
            px > this.genCZone.x1 + 4 &&
            px < this.genCZone.x2 - 4 &&
            py >= this.gY - 6
          ) {
            this.quickRespawn("Not yet — wait for the pulse to pass.");
          }
          if (
            !this.genC.active &&
            px > this.genCZone.x1 + 4 &&
            px < this.genCZone.x2 - 4 &&
            py >= this.gY - 6
          ) {
            this.quickRespawn("Not without power.");
          }

          this.player.x = px;
          this.player.y = py;
        }

        // ── Generator activations ──────────────────────────────────────
        solveGenA() {
          this.genA.active = true;
          this.genA.switchImg.setTexture("switch_blue_on");
          this.cameras.main.flash(360, 255, 200, 100, false);
          this.tweens.add({
            targets: this.genA.darkness,
            alpha: 0,
            duration: 1200,
          });
          this.genA.pillarImgs.forEach((img) =>
            this.tweens.add({ targets: img, alpha: 1, duration: 900 }),
          );
          this.genA.pillarBodyImgs.forEach((img) =>
            this.tweens.add({ targets: img, alpha: 0.9, duration: 900 }),
          );
          this.showText("The lights remember the way.", 2400);
          this.checkAllActive();
        }

        solveGenB() {
          this.genB.active = true;
          this.genB.completed = true;
          this.genB.switchImg.setTexture("switch_yellow_on");
          this.cameras.main.flash(360, 120, 180, 255, false);
          this.genB.arcG.clear();
          this.genB.safeWindow = this.genB.safeWindowTotal;
          this.tweens.add({
            targets: this.genB.insul,
            alpha: 1,
            duration: 400,
          });
          this.showText("Insulated — but not for long. Move!", 2200);
          this.checkAllActive();
        }

        solveGenC() {
          this.genC.active = true;
          this.genC.switchImg.setTexture("switch_orange_warning");
          this.cameras.main.flash(360, 255, 220, 120, false);
          this.genC.cycleT = 0;
          this.showText("Watch the rhythm. Move between pulses.", 2600);
          this.checkAllActive();
        }

        checkAllActive() {
          if (this.allActive) return;
          if (this.genA.active && this.genB.completed && this.genC.active) {
            this.allActive = true;
            this.time.delayedCall(600, () => this.activateChamber());
          }
        }

        // ── Final activation: chamber comes alive, gate opens ──────────
        activateChamber() {
          this.gateOpen = true;
          this.drawCables(1);
          this.cameras.main.shake(420, 0.012);
          this.cameras.main.flash(500, 220, 200, 255, false);

          this.tweens.add({
            targets: this.gateImg,
            x: this.gateImg.x - 160,
            alpha: 0.15,
            duration: 1100,
            ease: "Power2",
          });

          this.bgGears.forEach((g, i) => {
            g.spd = 0.3 + i * 0.15;
          });

          this.heartCharge = 1;

          this.showText("Some lights were waiting for you.", 3200, () => {
            this.time.delayedCall(800, () => {
              this.showText("[E] near the lever — Restore Power.", 3200);
            });
          });
        }

        // ── The lever: silence, then the Heart beats ────────────────────
        pullLever() {
          if (this.leverPulled) return;
          this.leverPulled = true;
          this.hidePrompt();
          this.leverImg.setTexture("switch_green_on");

          // Silence
          if (this.music) {
            this.tweens.add({ targets: this.music, volume: 0, duration: 600 });
          }

          this.time.delayedCall(900, () => {
            // THUMP 1
            this.cameras.main.shake(260, 0.02);
            this.cameras.main.flash(280, 255, 160, 60, false);
            this.heartPulseStrength = 1;

            this.time.delayedCall(650, () => {
              // THUMP 2
              this.cameras.main.shake(320, 0.026);
              this.cameras.main.flash(380, 255, 190, 100, false);

              this.time.delayedCall(500, () => {
                // Lights spread outward, orchestral swell (volume ramp)
                if (this.music) {
                  this.tweens.add({
                    targets: this.music,
                    volume: 0.4,
                    duration: 2200,
                  });
                }
                this.emergencyLights.forEach((l) => (l.stable = true));
                this.heartCharge = 1.6;

                this.time.delayedCall(2600, () => {
                  this.cameras.main.fade(2200, 0, 0, 0);
                  this.time.delayedCall(2200, () => {
                    if (this.music) this.music.stop();
                    this.scene.start("EndingScene");
                  });
                });
              });
            });
          });
        }

        checkInteract() {
          let px = this.player.x;

          this.nearGenA = !this.genA.active && Math.abs(px - this.genA.x) < 80;
          this.nearGenB = !this.genB.active && Math.abs(px - this.genB.x) < 80;
          this.nearGenC = !this.genC.active && Math.abs(px - this.genC.x) < 80;
          this.nearLever =
            this.gateOpen &&
            !this.leverPulled &&
            Math.abs(px - (this.heartX - 60)) < 80;

          if (Phaser.Input.Keyboard.JustDown(this.eKey)) {
            if (this.nearGenA) this.solveGenA();
            else if (this.nearGenB) this.solveGenB();
            else if (this.nearGenC) this.solveGenC();
            else if (this.nearLever) this.pullLever();
          }
        }

        updatePrompt() {
          let px = this.player.x;
          let sx = px - this.cameras.main.scrollX;
          let sy = this.player.y - PLAYER_H - 22;

          if (this.nearGenA) this.showPrompt("[E]  Activate Generator");
          else if (this.nearGenB) this.showPrompt("[E]  Activate Generator");
          else if (this.nearGenC) this.showPrompt("[E]  Activate Generator");
          else if (this.nearLever) this.showPrompt("[E]  Restore Power");
          else this.hidePrompt();

          if (this.interactPrompt) {
            this.interactPrompt.x = sx;
            this.interactPrompt.y = sy;
          }
        }

        update(time, delta) {
          tickGrain(this.grain, delta);

          // Animate background gears once awakened
          this.bgGears.forEach((g) => {
            if (g.spd) g.img.angle += g.spd * (delta / 16.6);
          });

          // Heart pulse + glow
          this.heartPulse += delta * 0.0026;
          if (this.heartCharge) this.drawHeart(this.heartCharge);

          // Generator A flickering middle pillar
          if (this.genA.active) {
            this.genA.flickerCycle += delta;
            let frac =
              (this.genA.flickerCycle % this.genA.flickerLen) /
              this.genA.flickerLen;
            let solid = frac < this.genA.flickerOnFrac;
            let alpha = solid ? 1 : 0.12;
            this.genA.pillarImgs[1].setAlpha(alpha);
            this.genA.pillarBodyImgs[1].setAlpha(solid ? 0.9 : 0.1);
          }

          // Generator C timing cycle
          if (this.genC.active) {
            this.genC.cycleT = (this.genC.cycleT || 0) + delta;
          } else {
            this.genC.cycleT = 0;
          }
          this.drawGenCGate(this.genC.cycleT);

          // Generator B: countdown the safe window, then re-energize
          if (this.genB.active && this.genB.safeWindow > 0) {
            this.genB.safeWindow -= delta;
            if (this.genB.safeWindow <= 600 && this.genB.safeWindow > 0) {
              // warning flicker as the window closes
              this.genB.insul.setAlpha(
                0.4 + 0.6 * Math.abs(Math.sin(this.genB.safeWindow * 0.02)),
              );
            }
            if (this.genB.safeWindow <= 0) {
              this.genB.insul.setAlpha(0);
              if (!this.gateOpen) {
                this.genB.active = false; // re-energized — must reactivate
                this.genB.switchImg.setTexture("switch_yellow_off");
                this.showText("The current returns.", 1800);
              }
            }
          }
          if (!this.genB.active) {
            this.genB.arcTimer += delta;
            if (this.genB.arcTimer > 220) {
              this.genB.arcTimer = 0;
              this.drawGenBArc();
            }
          }

          // Drips
          this.drips.forEach((d) => {
            d.t += delta * 0.001;
            d.g.clear();
            let dy = (d.t % 1) * 60;
            d.g.fillStyle(0x4a6a88, 0.4);
            d.g.fillCircle(d.x, d.y + dy, 2.5);
          });

          // Emergency lights flicker (stabilize after activation)
          this.emergencyLights.forEach((l) => {
            l.phase += delta * 0.004;
            l.g.clear();
            let a = l.stable
              ? 0.5
              : 0.15 + 0.25 * Math.max(0, Math.sin(l.phase * 3));
            let color = l.stable ? 0xe8a030 : 0xcc3322;
            l.g.fillStyle(color, a);
            l.g.fillCircle(l.x, l.y, 10);
            l.g.fillStyle(color, a * 0.3);
            l.g.fillCircle(l.x, l.y, 28);
          });

          // Ambient spark motes drift
          this.moteG.clear();
          this.sparkMotes.forEach((m) => {
            m.y -= (m.spd * delta) / 1000;
            if (m.y < this.gY - 340) m.y = this.gY - 20;
            this.moteG.fillStyle(0xffcc88, m.a);
            this.moteG.fillCircle(m.x, m.y, 1.5);
          });

          this.movePlayer(delta);
          if (!this.isFrozen) {
            this.checkInteract();
            this.updatePrompt();
          } else {
            this.hidePrompt();
          }
        }
      }

      // ════════════════════════════════════════════════════════════════
      // ENDING SCENE
      // ════════════════════════════════════════════════════════════════
      class EndingScene extends Phaser.Scene {
        constructor() {
          super({ key: "EndingScene" });
        }

        create() {
          this.cameras.main.setBackgroundColor("#080c14");
          this.cameras.main.fadeIn(2000);

          this.add
            .image(0, 0, "sky")
            .setOrigin(0, 0)
            .setDisplaySize(W, H)
            .setAlpha(0.83);
          this.add
            .image(0, H, "distantCity")
            .setOrigin(0, 1)
            .setDisplaySize(W, 270)
            .setAlpha(0.72);
          this.add
            .image(0, H, "midBuildings")
            .setOrigin(0, 1)
            .setDisplaySize(W * 1.2, 345)
            .setAlpha(0.68);

          let g = this.add.graphics();
          g.fillStyle(0x121820, 1);
          g.fillRect(0, H - 65, W, 65);
          g.fillGradientStyle(
            0x000000,
            0x000000,
            0x000000,
            0x000000,
            0,
            0,
            0.88,
            0.88,
          );
          g.fillRect(0, H - 220, W, 220);

          this.time.delayedCall(900, () => {
            for (let i = 0; i < 52; i++) {
              this.time.delayedCall(i * 80, () => {
                let wx = Phaser.Math.Between(26, W - 26);
                let wy = Phaser.Math.Between(95, 530);
                let wg = this.add.graphics();
                wg.fillStyle(0xd4780a, 0.9);
                wg.fillRect(wx, wy, 14, 18);
                wg.setAlpha(0);
                this.tweens.add({ targets: wg, alpha: 1, duration: 200 });
                let gl = this.add.graphics();
                gl.fillStyle(0xd4780a, 0.055);
                gl.fillCircle(wx + 7, wy + 9, 44);
                gl.setAlpha(0);
                this.tweens.add({
                  targets: gl,
                  alpha: 1,
                  duration: 400,
                  delay: i * 80,
                });
              });
            }
          });

          // Fireflies gathering — a quiet sign of life returning
          this.time.delayedCall(5200, () => {
            if (!this.textures.exists("fireflies")) return;
            for (let i = 0; i < 8; i++) {
              let fx = Phaser.Math.Between(W * 0.55, W - 60);
              let fy = Phaser.Math.Between(H - 260, H - 90);
              let fly = this.add
                .image(fx, fy, "fireflies")
                .setDisplaySize(9, 5)
                .setDepth(12)
                .setAlpha(0);
              this.tweens.add({
                targets: fly,
                alpha: { from: 0, to: Phaser.Math.FloatBetween(0.4, 0.9) },
                duration: Phaser.Math.Between(900, 1800),
                yoyo: true,
                repeat: -1,
                delay: Phaser.Math.Between(0, 2000),
              });
              this.tweens.add({
                targets: fly,
                x: fx + Phaser.Math.Between(-40, 40),
                y: fy + Phaser.Math.Between(-30, 30),
                duration: Phaser.Math.Between(4000, 7000),
                yoyo: true,
                repeat: -1,
                ease: "Sine.InOut",
              });
            }
          });

          // The sleeping cat, returned — a small silhouette by the rooftop edge
          this.time.delayedCall(5800, () => {
            if (!this.textures.exists("cat")) return;
            let cat = this.add
              .sprite(W * 0.18, H - 70, "cat")
              .setOrigin(0.5, 1)
              .setDisplaySize(46, 46)
              .setDepth(11)
              .setAlpha(0);
            cat.play("anim_cat_sleep");
            this.tweens.add({ targets: cat, alpha: 0.85, duration: 1200 });
          });

          this.time.delayedCall(3400, () => {
            let tg = this.add.graphics().setDepth(10);
            tg.fillStyle(0x1a1c2a, 1);
            tg.fillRoundedRect(0, H - 128, 228, 68, 4);
            tg.fillStyle(0xb07818, 0.92);
            for (let i = 0; i < 4; i++)
              tg.fillRect(12 + i * 53, H - 118, 43, 28);
            tg.fillStyle(0xd4780a, 0.062);
            tg.fillRoundedRect(-38, H - 162, 304, 114, 9);
            tg.x = -258;
            this.tweens.add({
              targets: tg,
              x: W + 110,
              duration: 7200,
              ease: "Sine.InOut",
            });
          });

          mkBars(this, 600);
          mkVignette(this, 595);
          this.rain = mkRain(this, 155, 100);
          this.grain = mkGrain(this, 500);

          this.time.delayedCall(1700, () =>
            this.ft(
              "Even sleeping hearts remember how to beat.",
              H / 2 - 38,
              "#4d6270",
              "20px",
            ),
          );
          this.time.delayedCall(4400, () =>
            this.ft(
              "Some lights were waiting for you.",
              H / 2 + 8,
              "#5d7280",
              "22px",
            ),
          );
          this.time.delayedCall(7400, () =>
            this.ft("The city remembered.", H / 2 + 65, "#c8a050", "30px"),
          );

          this.time.delayedCall(12000, () => {
            let dark = this.add
              .rectangle(W / 2, H / 2, W, H, 0x000000)
              .setAlpha(0)
              .setDepth(380);
            this.tweens.add({
              targets: dark,
              alpha: 0.95,
              duration: 2500,
              onComplete: () => {
                [
                  {
                    t: "THE SLEEPING CITY",
                    y: H / 2 - 72,
                    s: "64px",
                    c: "#c8a050",
                    f: "Cinzel",
                  },
                  {
                    t: "Restore Power. Awaken Hope.",
                    y: H / 2 + 16,
                    s: "24px",
                    c: "#668090",
                    f: "EB Garamond",
                  },
                  {
                    t: "Designed by Roky Paul  |  Null Paradox  |  PW Games × IOI Hackathon",
                    y: H / 2 + 72,
                    s: "14px",
                    c: "#3d5060",
                    f: "EB Garamond",
                  },
                  {
                    t: "[ SPACE ] Continue",
                    y: H / 2 + 112,
                    s: "14px",
                    c: "#2d3d48",
                    f: "EB Garamond",
                  },
                ].forEach((item, i) => {
                  this.add
                    .text(W / 2, item.y, item.t, {
                      fontFamily: item.f,
                      fontSize: item.s,
                      color: item.c,
                    })
                    .setOrigin(0.5)
                    .setDepth(400)
                    .setAlpha(0);
                  let tx = this.children.list[this.children.list.length - 1];
                  this.tweens.add({
                    targets: tx,
                    alpha: 1,
                    duration: 1400,
                    delay: i * 360,
                  });
                });
                this.input.keyboard.once("keydown-SPACE", () => {
                  this.cameras.main.fade(1100, 0, 0, 0);
                  this.time.delayedCall(1100, () =>
                    this.scene.start("SummaryScene"),
                  );
                });
              },
            });
          });
        }

        ft(text, y, color, size) {
          let t = this.add
            .text(W / 2, y, text, {
              fontFamily: "EB Garamond",
              fontStyle: "italic",
              fontSize: size,
              color: color,
            })
            .setOrigin(0.5)
            .setDepth(300)
            .setAlpha(0);
          this.tweens.add({ targets: t, alpha: 1, duration: 1050 });
        }

        update(time, delta) {
          tickRain(this.rain, delta);
          tickGrain(this.grain, delta);
        }
      }

      // ════════════════════════════════════════════════════════════════
      // SUMMARY SCENE — a quiet reflection on what was learned
      // ════════════════════════════════════════════════════════════════
      class SummaryScene extends Phaser.Scene {
        constructor() {
          super({ key: "SummaryScene" });
        }

        create() {
          this.cameras.main.setBackgroundColor("#05060c");
          this.cameras.main.fadeIn(1400);

          this.grain = mkGrain(this, 5);

          this.add
            .text(W / 2, 78, "What You Learned", {
              fontFamily: "Cinzel",
              fontSize: "34px",
              color: "#c8a050",
            })
            .setOrigin(0.5)
            .setDepth(10)
            .setAlpha(0)
            .setData("fadeTarget", true);

          let title = this.children.list[this.children.list.length - 1];
          this.tweens.add({ targets: title, alpha: 1, duration: 1200 });

          const lessons = [
            {
              concept: "Circuits & Conductivity",
              detail:
                "Learned by finding the broken fuse box, then the metal rod — and connecting the two to restore power.",
            },
            {
              concept: "Hidden Paths",
              detail:
                "Learned by lighting the dark — once power returned, the ground that seemed solid revealed its true gaps.",
            },
            {
              concept: "Insulation",
              detail:
                "Learned at the pond — rubber held against the water, while metal and wood gave way beneath it.",
            },
            {
              concept: "Timing",
              detail:
                "Learned deep in the chamber — crossing the pulse gate meant moving the instant the danger passed, not before.",
            },
            {
              concept: "Restoring Power",
              detail:
                "Learned at the Heart of the City — every small repair led to one final act: pulling the lever that woke it all.",
            },
          ];

          const startY = 160;
          const rowH = 92;

          lessons.forEach((lesson, i) => {
            let y = startY + i * rowH;

            let card = this.add.graphics().setDepth(9).setAlpha(0);
            card.fillStyle(0x10141c, 0.9);
            card.fillRoundedRect(W / 2 - 420, y - 30, 840, 76, 8);
            card.lineStyle(1.5, 0x3a4a60, 0.7);
            card.strokeRoundedRect(W / 2 - 420, y - 30, 840, 76, 8);

            let conceptText = this.add
              .text(W / 2 - 390, y - 4, lesson.concept, {
                fontFamily: "Cinzel",
                fontSize: "19px",
                color: "#e8c878",
              })
              .setOrigin(0, 0.5)
              .setDepth(10)
              .setAlpha(0);

            let detailText = this.add
              .text(W / 2 - 390, y + 20, lesson.detail, {
                fontFamily: "EB Garamond",
                fontStyle: "italic",
                fontSize: "15px",
                color: "#aabbcc",
                wordWrap: { width: 780 },
              })
              .setOrigin(0, 0.5)
              .setDepth(10)
              .setAlpha(0);

            this.tweens.add({
              targets: [card, conceptText, detailText],
              alpha: 1,
              duration: 900,
              delay: 600 + i * 320,
            });
          });

          let prompt = this.add
            .text(W / 2, H - 50, "[ SPACE ] Play Again", {
              fontFamily: "EB Garamond",
              fontSize: "15px",
              color: "#5d7280",
            })
            .setOrigin(0.5)
            .setDepth(10)
            .setAlpha(0);
          this.tweens.add({
            targets: prompt,
            alpha: 1,
            duration: 1000,
            delay: 600 + lessons.length * 320 + 400,
          });
          this.tweens.add({
            targets: prompt,
            alpha: { from: 0.5, to: 1 },
            duration: 1000,
            yoyo: true,
            repeat: -1,
            delay: 600 + lessons.length * 320 + 1400,
          });

          this.input.keyboard.once("keydown-SPACE", () => {
            this.cameras.main.fade(1100, 0, 0, 0);
            this.time.delayedCall(1100, () => this.scene.start("TitleScene"));
          });
        }

        update(time, delta) {
          tickGrain(this.grain, delta);
        }
      }

      // ════════════════════════════════════════════════════════════════
      // BOOT
      // ════════════════════════════════════════════════════════════════
      window.game = new Phaser.Game({
        type: Phaser.AUTO,
        width: W,
        height: H,
        backgroundColor: "#000000",
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        scene: [
          PreloadScene,
          TitleScene,
          OutsideScene,
          TunnelScene,
          FallScene,
          CityScene,
          HeartChamberScene,
          EndingScene,
          SummaryScene,
        ],
      });
    </script>
