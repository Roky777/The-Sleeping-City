            g.fillStyle(0xffe070, 0.9);
            g.fillCircle(x + 10 * scale, y - 24 * scale, 2.4 * scale);
          }
        }

        // Checks for two combinable pairs:
        //  1) headSlot + tailSlot -> outBody (mouse body)
        //  2) outBody + batterySlot -> outFinal (solved)
        checkMousePuzzle() {
          let slots = this.mpSlots;

          // Stage 1: head + tail -> mouse body
          if (
            !slots.outBody.filled &&
            slots.headSlot.filled &&
            slots.headSlot.filled.type === "mouseHead" &&
            slots.tailSlot.filled &&
            slots.tailSlot.filled.type === "mouseTail"
          ) {
            let headItem = slots.headSlot.filled;
            let tailItem = slots.tailSlot.filled;

            // remove the two pieces from their slots/tray entirely
            headItem.g.destroy();
            headItem.handle.destroy();
            tailItem.g.destroy();
            tailItem.handle.destroy();
            this.mpDraggables = this.mpDraggables.filter(
              (d) => d !== headItem && d !== tailItem,
            );
            slots.headSlot.filled = null;
            slots.tailSlot.filled = null;

            // create the combined mouse-body icon sitting in outBody
            let bodyG = this.add.graphics().setScrollFactor(0).setDepth(703);
            this.drawMousePuzzleIcon(
              bodyG,
              "mouseBody",
              slots.outBody.x,
              slots.outBody.y,
              1.6,
            );
            this.mpElements.push(bodyG);

            let handle = this.add
              .rectangle(
                slots.outBody.x,
                slots.outBody.y,
                90,
                90,
                0xffffff,
                0.001,
              )
              .setScrollFactor(0)
              .setDepth(704)
              .setInteractive({ useHandCursor: true, draggable: true });
            this.mpElements.push(handle);

            let bodyItem = {
              type: "mouseBody",
              g: bodyG,
              handle,
              homeX: slots.outBody.x,
              homeY: slots.outBody.y,
              x: slots.outBody.x,
              y: slots.outBody.y,
              placedSlot: "outBody",
            };
            this.mpDraggables.push(bodyItem);
            slots.outBody.filled = bodyItem;
            if (slots.outBody.label) slots.outBody.label.setVisible(false);
            if (slots.headSlot.label) slots.headSlot.label.setVisible(true);
            if (slots.tailSlot.label) slots.tailSlot.label.setVisible(true);

            handle.on("drag", (pointer, dragX, dragY) => {
              bodyItem.x = dragX;
              bodyItem.y = dragY;
              handle.x = dragX;
              handle.y = dragY;
              this.drawMousePuzzleIcon(bodyG, "mouseBody", dragX, dragY, 1.6);
            });
            handle.on("dragend", () => {
              this.handleMouseItemDrop(bodyItem);
            });
            this.input.setDraggable(handle);

            this.cameras.main.flash(220, 200, 220, 255, false);
            this.showHint("The pieces fit together.");
          }

          // Stage 2: mouse body + battery -> final toy (solved)
          if (
            slots.outBody.filled &&
            slots.outBody.filled.type === "mouseBody" &&
            slots.batterySlot.filled &&
            slots.batterySlot.filled.type === "battery"
          ) {
            this.solveMousePuzzle();
          }
        }

        solveMousePuzzle() {
          this.mousePuzzleSolved = true;
          if (this.hintBtn) {
            this.hintBtn.setVisible(false);
            this.tweens.killTweensOf(this.hintBtn);
          }

          // Replace mouse body in outBody + battery with the final powered toy in outFinal
          let slots = this.mpSlots;
          let bodyItem = slots.outBody.filled;
          let batteryItem = slots.batterySlot.filled;
          if (bodyItem) {
            bodyItem.g.destroy();
            bodyItem.handle.destroy();
          }
          if (batteryItem) {
            batteryItem.g.destroy();
            batteryItem.handle.destroy();
          }
          let finalG = this.add.graphics().setScrollFactor(0).setDepth(703);
          this.drawMousePuzzleIcon(
            finalG,
            "finalToy",
            slots.outFinal.x,
            slots.outFinal.y,
            1.6,
          );
          this.mpElements.push(finalG);

          this.cameras.main.flash(420, 120, 255, 160, false);

          this.time.delayedCall(900, () => {
            this.closeMousePuzzle();
            this.startMouseRunSequence();
          });
        }

        closeMousePuzzle() {
          this.mousePuzzleOpen = false;
          if (this.mpOverlay) {
            this.mpOverlay.destroy();
            this.mpOverlay = null;
          }
          if (this.mpElements) {
            this.mpElements.forEach((el) => el.destroy());
            this.mpElements = null;
          }
          this.mpSlots = null;
          this.mpDraggables = null;
        }

        // ════════════════════════════════════════════════════════════
        // POST-PUZZLE: toy mouse scurries to the tree, cat wakes & chases
        // ════════════════════════════════════════════════════════════
        startMouseRunSequence() {
          if (this.mouseSequenceStarted) return;
          this.mouseSequenceStarted = true;

          this.showHint("whirr...");

          // Spawn the toy mouse where its tail piece was found
          let mouseLead = 60; // distance in front of cat
          let mouseStartX = this.cat.x + mouseLead;
          let mouseY = this.gY - 2;
          this.toyMouse = this.add.graphics().setDepth(53);
          let targetX = this.treeX - 60;
          // Moving rightward (toward the tree) — flip so the face points right
          let facingRight = targetX > mouseStartX;
          this.drawMouseBodyIcon(
            this.toyMouse,
            mouseStartX,
            mouseY,
            0.8,
            facingRight,
          );
          let mouseState = { x: mouseStartX };

          let runDuration = Math.abs(targetX - mouseStartX) * 2.0;

          this.time.delayedCall(700, () => {
            // toy mouse runs to the tree
            this.tweens.add({
              targets: mouseState,
              x: targetX,
              duration: runDuration,
              ease: "Sine.InOut",
              onUpdate: () => {
                this.toyMouse.clear();
                this.drawMouseBodyIcon(
                  this.toyMouse,
                  mouseState.x,
                  mouseY,
                  0.6,
                  facingRight,
                );
              },
              onComplete: () => {
                this.toyMouse.clear();
                this.glowIntensity = 1;
              },
            });

            // cat wakes shortly after and chases
            this.time.delayedCall(500, () => {
              this.wakeCat(targetX);
            });
          });
        }

        wakeCat(targetX) {
          this.catAwake = true;
          this.cat.setTexture("runningcat", 0);
          this.cat.setDisplaySize(80, 56);
          this.cat.play("anim_cat_run");
          let runDuration = Math.abs(targetX - this.cat.x) * 6.0;
          this.tweens.add({
            targets: this.cat,
            x: targetX - 40,
            duration: runDuration,
            ease: "Sine.Out",
            onComplete: () => {
              this.cat.stop();
              this.cat.setTexture("cat", 0);
              this.cat.setDisplaySize(56, 56);
              this.cat.play("anim_cat_sleep");
              this.showHint("The tree stirs. Something has changed.");
            },
          });
        }

        setAnim(name) {
          setPlayerAnim(this.player, this, name);
        }

        update(time, delta) {
          tickRain(this.rain, delta);
          tickGrain(this.grain, delta);

          if (
            this.triggered ||
            this.puzzleOpen ||
            this.mousePuzzleOpen ||
            this.controlsBlocking
          )
            return;

          let dt = delta / 1000;
          let px = this.player.x,
            py = this.player.y;

          this.pVY += this.gravity * dt;
          py += this.pVY * dt;
          if (py >= this.gY) {
            py = this.gY;
            this.pVY = 0;
            this.onGround = true;
          } else this.onGround = false;

          let moving = false;
          if ((this.cursors.left.isDown || this.wasd.A.isDown) && px > 30) {
            px -= this.speed * dt;
            this.player.setFlipX(true);
            moving = true;
          }
          if (this.cursors.right.isDown || this.wasd.D.isDown) {
            px += this.speed * dt;
            this.player.setFlipX(false);
            moving = true;
          }
          if (
            (this.cursors.up.isDown ||
              this.cursors.space.isDown ||
              this.wasd.W.isDown) &&
            this.onGround
          ) {
            this.pVY = -360;
            this.setAnim("jump");
          }

          if (!this.onGround) {
            this.setAnim(this.pVY < 0 ? "jump" : "fall");
          } else if (moving) {
            this.setAnim("run");
          } else {
            this.setAnim("stand");
          }

          // ── Hint triggers based on distance traveled ──
          this.hints.forEach((h, i) => {
            if (!this.hintsShown.has(i) && px >= h.x) {
              this.hintsShown.add(i);
              this.showHint(h.text);
            }
          });

          // ── Item pickups: Battery, Head of Mouse, Tail of Mouse ──
          this.checkItemPickup(
            px,
            py,
            "battery",
            this.batteryX,
            "Battery",
            "A small battery, still intact.",
          );
          this.checkItemPickup(
            px,
            py,
            "mouseHead",
            this.mouseHeadX,
            "Head of an Electrical Mouse Press 'E' to collect",
            "Head of an electrical mouse...",
          );
          this.checkItemPickup(
            px,
            py,
            "mouseTail",
            this.mouseTailX,
            "Tail of an Electrical Mouse",
            "Tail of an electrical mouse...",
          );

          // Keep ambient item labels positioned above their items as camera scrolls
          if (this.itemLabels) {
            if (this.itemLabels.battery)
              this.itemLabels.battery.x =
                this.batteryX - this.cameras.main.scrollX;
            if (this.itemLabels.mouseHead)
              this.itemLabels.mouseHead.x =
                this.mouseHeadX - this.cameras.main.scrollX;
            if (this.itemLabels.mouseTail)
              this.itemLabels.mouseTail.x =
                this.mouseTailX - this.cameras.main.scrollX;
          }

          // ── Tree glow ramps as player approaches (full once puzzle solved) ──
          if (this.puzzleSolved) {
            this.glowIntensity = 1;
          } else {
            let distToTree = this.treeX - px;
            if (distToTree < 900) {
              this.glowIntensity = Phaser.Math.Clamp(
                1 - distToTree / 900,
                0,
                1,
              );
            }
          }

          // ── Near the hole: locked until puzzle solved ──
          if (Math.abs(px - this.holeX) < 36 && py >= this.gY) {
            if (this.puzzleSolved) {
              this.triggered = true;
              this.cameras.main.shake(380, 0.009);
              if (this.windSnd)
                this.tweens.add({
                  targets: this.windSnd,
                  volume: 0.3,
                  duration: 800,
                });
              this.time.delayedCall(550, () => {
                this.cameras.main.fade(900, 0, 0, 0);
                if (this.rainSnd)
                  this.tweens.add({
                    targets: this.rainSnd,
                    volume: 0.05,
                    duration: 900,
                  });
                if (this.windSnd)
                  this.tweens.add({
                    targets: this.windSnd,
                    volume: 0.05,
                    duration: 900,
                  });
                if (this.music)
                  this.tweens.add({
                    targets: this.music,
                    volume: 0.12,
                    duration: 900,
                  });
                this.time.delayedCall(900, () => {
                  if (this.rainSnd) this.rainSnd.stop();
                  if (this.windSnd) this.windSnd.stop();
                  this.scene.start("TunnelScene", { music: this.music });
                });
              });
            } else if (!this.lockedHintShown) {
              this.lockedHintShown = true;
              this.showHint(
                "The hole is sealed by something... powerless. There must be another way to wake this place.",
              );
            }
          }

          // ── Single-pass interaction prompt (cat / tree) — only one shown at a time ──
          let nearCat =
            !this.catAwake && Math.abs(px - this.catX) < 80 && py >= this.gY;
          let nearTreePuzzle =
            Math.abs(px - (this.treeX - 90)) < 90 && py >= this.gY;

          if (nearCat && this.collectedCount >= 3 && !this.mousePuzzleSolved) {
            this.showPuzzlePrompt("[E]  Use Collected Parts");
            if (this.puzzlePrompt) {
              this.puzzlePrompt.x = px - this.cameras.main.scrollX;
              this.puzzlePrompt.y = py - PLAYER_H - 22;
            }
            if (
              Phaser.Input.Keyboard.JustDown(this.eKey) &&
              !this.mousePuzzleOpen
            ) {
              this.openMousePuzzle();
            }
          } else if (nearCat && this.collectedCount < 3) {
            if (this.catWakeAttempts < 2) {
              this.showPuzzlePrompt("[E]  Wake Cat");
            } else {
              this.showPuzzlePrompt(
                "The cat is very tired... there must be another way.",
              );
            }

            if (this.puzzlePrompt) {
              this.puzzlePrompt.x = px - this.cameras.main.scrollX;
              this.puzzlePrompt.y = py - PLAYER_H - 22;
            }

            if (Phaser.Input.Keyboard.JustDown(this.eKey)) {
              this.catWakeAttempts++;

              // Small reaction
              this.cat.y -= 2;

              this.time.delayedCall(120, () => {
                this.cat.y += 2;
              });

              if (this.catWakeAttempts === 1) {
                this.showHint("The cat barely reacts.");
              }

              if (this.catWakeAttempts === 2) {
                this.showHint(
                  "The cat is very tired... there must be another way.",
                );
              }
            }
          } else if (
            !this.puzzleSolved &&
            nearTreePuzzle &&
            !this.puzzleOpen &&
            this.mousePuzzleSolved
          ) {
            this.showPuzzlePrompt("[E]  Restore the circuit");
            if (this.puzzlePrompt) {
              this.puzzlePrompt.x = px - this.cameras.main.scrollX;
              this.puzzlePrompt.y = py - PLAYER_H - 22;
            }
            if (Phaser.Input.Keyboard.JustDown(this.eKey)) {
              this.openPuzzle();
            }
          } else {
            this.hidePuzzlePrompt();
          }

          this.player.x = px;
          this.player.y = py;
        }
      }

      // ════════════════════════════════════════════════════════════════
      // TUNNEL SCENE — player drops through a narrow industrial shaft
      // before breaking out into the open fall over the city
      // ════════════════════════════════════════════════════════════════
      class TunnelScene extends Phaser.Scene {
        constructor() {
          super({ key: "TunnelScene" });
        }

        init(data) {
          this.passedMusic = data && data.music;
        }

        create() {
          this.cameras.main.setBackgroundColor("#05060a");
          this.music = this.passedMusic;

          // ── Tunnel walls — vertical industrial pipe/panel tiles, tiled and
          // scrolling upward past the player to sell the sense of falling ──
          const WALL_W = 110;
          const TILE_H = 140;
          this.wallTiles = [];

          let leftKeys = [
            "pipe_vertical1",
            "pipe_vertical3",
            "panel_console_detail",
          ];
          let rightKeys = [
            "pipe_vertical2",
            "pipe_vertical4",
            "panel_console_detail",
          ];

          let tilesNeeded = Math.ceil(H / TILE_H) + 2;
          for (let i = -1; i < tilesNeeded; i++) {
            let lKey = leftKeys[Math.abs(i) % leftKeys.length];
            let rKey = rightKeys[Math.abs(i) % rightKeys.length];
            let l = this.add
              .image(0, i * TILE_H, lKey)
              .setOrigin(0, 0)
              .setDisplaySize(WALL_W, TILE_H)
              .setDepth(5);
            let r = this.add
              .image(W, i * TILE_H, rKey)
              .setOrigin(1, 0)
              .setDisplaySize(WALL_W, TILE_H)
              .setFlipX(true)
              .setDepth(5);
            this.wallTiles.push(l, r);
          }

          // Dark gradient shading at the tunnel edges for depth
          let shade = this.add.graphics().setDepth(6);
          shade.fillGradientStyle(
            0x000000,
            0x000000,
            0x000000,
            0x000000,
            0.7,
            0.7,
            0,
            0,
          );
          shade.fillRect(0, 0, WALL_W + 40, H);
          shade.fillGradientStyle(
            0x000000,
            0x000000,
            0x000000,
            0x000000,
            0,
            0,
            0.7,
            0.7,
          );
          shade.fillRect(W - WALL_W - 40, 0, WALL_W + 40, H);

          // ── Falling player, drifting slightly side to side ──
          this.fp = this.add
            .sprite(W / 2, H * 0.32, "fall")
            .setOrigin(0.5, 0.5)
            .setScale((PLAYER_H / PLAYER_ANIMS.fall.charH) * 1.3)
            .setDepth(20);
          this.fp.play("anim_fall");

          this.tweens.add({
            targets: this.fp,
            x: { from: W / 2 - 30, to: W / 2 + 30 },
            duration: 900,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });

          // Wind streaks
          this.windG = this.add.graphics().setDepth(15);
          this.winds = [];
          for (let i = 0; i < 22; i++) {
            this.winds.push({
              x: Phaser.Math.Between(WALL_W, W - WALL_W),
              y: Phaser.Math.Between(0, H),
              spd: Phaser.Math.FloatBetween(500, 850),
              len: Phaser.Math.Between(30, 70),
              a: Phaser.Math.FloatBetween(0.06, 0.2),
            });
          }

          this.scrollSpeed = 620;
          this.tileH = TILE_H;
          mkBars(this, 600);
          this.grain = mkGrain(this, 550);

          this.cameras.main.fadeIn(300);

          this.time.delayedCall(2200, () => {
            this.cameras.main.fade(450, 0, 0, 0);
            this.time.delayedCall(450, () => {
              this.scene.start("FallScene", { music: this.music });
            });
          });
        }

        update(time, delta) {
          let dy = (this.scrollSpeed * delta) / 1000;
          let wrapRange = this.tileH * Math.ceil(H / this.tileH + 2);
          this.wallTiles.forEach((t) => {
            t.y -= dy;
            if (t.y < -this.tileH) t.y += wrapRange;
          });

          this.windG.clear();
          this.winds.forEach((w) => {
            w.y -= (w.spd * delta) / 1000;
            if (w.y < -20) w.y = H + 20;
            this.windG.lineStyle(1, 0x303a4a, w.a);
            this.windG.beginPath();
            this.windG.moveTo(w.x, w.y);
            this.windG.lineTo(w.x, w.y - w.len);
            this.windG.strokePath();
          });

          tickGrain(this.grain, delta);
        }
      }

      // ════════════════════════════════════════════════════════════════
      // FALL SCENE — cinematic drop into the city
      // ════════════════════════════════════════════════════════════════
      class FallScene extends Phaser.Scene {
        constructor() {
          super({ key: "FallScene" });
        }

        init(data) {
          this.passedMusic = data && data.music;
        }

        create() {
          this.cameras.main.setBackgroundColor("#000000");
          this.music = this.passedMusic;

          // Rushing city silhouettes
          for (let i = 0; i < 12; i++) {
            let g = this.add.graphics();
            g.fillStyle(0x050810, Phaser.Math.FloatBetween(0.12, 0.4));
            g.fillRect(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(-300, H),
              Phaser.Math.Between(25, 110),
              Phaser.Math.Between(80, 300),
            );
            this.tweens.add({
              targets: g,
              y: `+=${H * 1.6}`,
              duration: Phaser.Math.Between(650, 1350),
              repeat: -1,
              delay: Phaser.Math.Between(0, 700),
            });
          }

          // Falling player
          this.fp = this.add
            .sprite(W / 2, -110, "fall")
            .setOrigin(0.5, 0.5)
            .setScale((PLAYER_H / PLAYER_ANIMS.fall.charH) * 1.4)
            .setDepth(20);
          this.fp.play("anim_fall");

          this.tweens.add({
            targets: this.fp,
            y: H + 120,
            duration: 2500,
            ease: "Cubic.In",
          });
          this.tweens.add({
            targets: this.fp,
            angle: { from: -10, to: 16 },
            duration: 2500,
          });

          // Wind streaks
          this.windG = this.add.graphics().setDepth(10);
          this.winds = [];
          for (let i = 0; i < 32; i++) {
            this.winds.push({
              x: Phaser.Math.Between(0, W),
              y: Phaser.Math.Between(0, H),
              spd: Phaser.Math.FloatBetween(650, 1100),
              len: Phaser.Math.Between(40, 95),
              a: Phaser.Math.FloatBetween(0.08, 0.28),
            });
          }

          mkBars(this, 600);
          this.grain = mkGrain(this, 550);

          this.time.delayedCall(2600, () => {
            this.cameras.main.flash(750, 255, 255, 255, false);
            this.time.delayedCall(750, () =>
              this.scene.start("CityScene", { music: this.music }),
            );
          });
        }

        update(time, delta) {
          this.windG.clear();
          this.winds.forEach((w) => {
            w.y += (w.spd * delta) / 1000;
            if (w.y > H + 20) w.y = -20;
            this.windG.lineStyle(1, 0x182838, w.a);
            this.windG.beginPath();
            this.windG.moveTo(w.x, w.y);
            this.windG.lineTo(w.x + Phaser.Math.Between(-7, 7), w.y + w.len);
            this.windG.strokePath();
          });
          tickGrain(this.grain, delta);
        }
      }

      // ════════════════════════════════════════════════════════════════
      // CITY SCENE — main gameplay
      // ════════════════════════════════════════════════════════════════
      class CityScene extends Phaser.Scene {
        constructor() {
          super({ key: "CityScene" });
        }

        init(data) {
          this.passedMusic = data && data.music;
        }

        create() {
          this.cameras.main.setBackgroundColor("#131820");
          this.worldW = 6200;
          this.gY = 608;
          this.pVY = 0;
          this.gravity = 900;
          this.onGround = true;
          this.isLanding = false;
          this.speed = 218;
          this.isDead = false;
          this.respawnX = 160;
          this.respawnY = this.gY;
          this.curAnim = null;

          this.hasRod = false;
          this.p1Solved = false;
          this.p2Solved = false;
          this.pitZones = [];
          this.lamps = [];
          this.eyePairs = [];
          this.interactPrompt = null;
          this.inventoryText = null;
          this.nearFuseBox = false;
          this.nearRod = false;
          // ── Pond crossing (Puzzle 2) ──
          this.pondX1 = 4300;
          this.pondX2 = 5100;
          this.plates = { rubber: false, metal: false, wood: false };
          this.plateOrder = ["rubber", "metal", "wood"];
          this.plateSelectIndex = 0;
          this.plateSelected = false;
          this.placedPlate = null; // { type, img, x }
          this.isFloating = false;
          this.crossingFinished = false;
          this.arcTimer = 0;

          this.buildBG();
          this.buildGround();
          this.buildEnvironment();
          this.buildAtmosphere();

          this.rain = mkRain(this, 245, 130, H - 62);
          mkVignette(this, 175);
          mkBars(this, 600);
          this.grain = mkGrain(this, 560);
          this.touch = mkTouchControls(this, "E");

          this.createPlayer();

          this.cameras.main.setBounds(0, 0, this.worldW, H);
          this.cameras.main.startFollow(this.player, true, 0.06, 0.06);
          this.cursors = this.input.keyboard.createCursorKeys();
          this.wasd = this.input.keyboard.addKeys("W,A,S,D");
          this.eKey = this.input.keyboard.addKey("E");
          this.fKey = this.input.keyboard.addKey("F");
          // to a quieter "underground" presence
          this.music = this.passedMusic;
          if (this.music && this.music.isPlaying) {
            this.tweens.add({
              targets: this.music,
              volume: 0.12,
              duration: 2500,
            });
          } else if (this.cache.audio.exists("ambientOpening")) {
            // fallback: if no music was carried (e.g. scene started directly), start fresh
            this.music = this.sound.add("ambientOpening", {
              loop: true,
              volume: 0,
            });
            this.music.play();
            this.tweens.add({
              targets: this.music,
              volume: 0.12,
              duration: 2500,
            });
          }

          this.cameras.main.fadeIn(2200);
          this.time.delayedCall(1900, () => this.showText("...", 2000));
          this.time.delayedCall(3000, () => this.showText("Where am I?", 2500));
          this.time.delayedCall(8800, () =>
            this.showText("I need to find a way home.", 2800),
          );

          // ── Ambient lines triggered by distance traveled ──
          this.ambientLines = [
            {
              x: 2700,
              text: "The hum of old machines... still breathing.",
              shown: false,
            },
            { x: 3500, text: "Quiet here. Almost peaceful.", shown: false },
            { x: 4200, text: "I can hear water ahead.", shown: false },
          ];
        }

        // ── Background ─────────────────────────────────────────────
        buildBG() {
          let solidSky = this.add.graphics();
          solidSky.fillStyle(0x0a0d16, 1);
          solidSky.fillRect(0, 0, this.worldW, H);
          solidSky.setScrollFactor(0.05);
          this.add
            .image(0, 0, "sky")
            .setOrigin(0, 0)
            .setDisplaySize(this.worldW, H)
            .setScrollFactor(0.05)
            .setAlpha(0.55)
            .setTint(0x222a40);

          for (let i = 0; i < 5; i++)
            this.add
              .image(i * 1850, H - 115, "distantCity")
              .setOrigin(0, 1)
              .setDisplaySize(1910, 275)
              .setScrollFactor(0.12)
              .setAlpha(0.45)
              .setTint(0x10131e);

          for (let i = 0; i < 7; i++)
            this.add
              .image(i * 1350, H - 75, "farBuildings")
              .setOrigin(0, 1)
              .setDisplaySize(1410, 400)
              .setScrollFactor(0.26)
              .setAlpha(0.5)
              .setTint(0x141926);

          for (let i = 0; i < 8; i++)
            this.add
              .image(i * 1150, H - 48, "midBuildings")
              .setOrigin(0, 1)
              .setDisplaySize(1210, 360)
              .setScrollFactor(0.46)
              .setAlpha(0.6)
              .setTint(0x181d2c);

          // Heavy dark overlay across the upper/mid background to smother the
          // hard rectangular seams between tiled background images
          let dark = this.add.graphics().setScrollFactor(0).setDepth(0.5);
          dark.fillGradientStyle(
            0x05060a,
            0x05060a,
            0x05060a,
            0x05060a,
            0.55,
            0.55,
            0.15,
            0.15,
          );
          dark.fillRect(0, 0, W, H * 0.78);
        }

        // ── Ground ─────────────────────────────────────────────────
        buildGround() {
          // Dark fill beneath the ground tiles (visible through any gaps)
          let g = this.add.graphics();
          g.fillStyle(0x0c0e16, 1);
          g.fillRect(0, this.gY + 28, this.worldW, H - this.gY - 28);

          // ═══ Pillar-hop section (Puzzle 1) ═══════════════════════════
          // A sequence of raised pillar platforms separated by pit gaps.
          // Player must jump pillar-to-pillar; pits are clear gaps to a void.
          const PILLAR_TOP = this.gY - 34; // pillars sit above the main ground line
          const PILLAR_W = 130;
          const PIT_W = 80;
          const SECTION_START = 1300;

          this.pillars = [];
          this.pitZones = [];
          let px = SECTION_START;
          for (let n = 0; n < 6; n++) {
            this.pillars.push({ x1: px, x2: px + PILLAR_W, top: PILLAR_TOP });
            px += PILLAR_W;
            if (n < 5) {
              this.pitZones.push({ x1: px, x2: px + PIT_W });
              px += PIT_W;
            }
          }
          const SECTION_END = px; // = 2480

          let flatKeys = [
            "ground_flat1",
            "ground_flat2",
            "ground_flat3",
            "ground_flat4",
            "ground_flat5",
            "ground_flat6",
            "ground_flat7",
            "ground_flat8",
            "ground_flat9",
            "ground_flat10",
          ];
          const TILE = 140;
          let i = 0;
          for (let x = 0; x < this.worldW; x += TILE) {
            if (x + TILE > SECTION_START && x < SECTION_END) {
              i++;
              continue;
            }
            if (x + TILE > this.pondX1 && x < this.pondX2) {
              i++;
              continue;
            }
            let key = flatKeys[i % flatKeys.length];
            this.add
              .image(x, this.gY, key)
              .setOrigin(0, 0)
              .setDisplaySize(TILE, TILE)
              .setDepth(1);
            i++;
          }

          // Rim caps where the normal ground breaks off into the pillar section
          this.add
            .image(SECTION_START, this.gY, "ground_pit_v_left")
            .setOrigin(1, 0)
            .setDisplaySize(140, 140)
            .setDepth(2);
          this.add
            .image(SECTION_END, this.gY, "ground_pit_v_right")
            .setOrigin(0, 0)
            .setDisplaySize(140, 140)
            .setDepth(2);

          // Void beneath the whole pillar-hop stretch
          let pitVoid = this.add.graphics().setDepth(1);
          pitVoid.fillStyle(0x05060a, 1);
          pitVoid.fillRect(
            SECTION_START,
            this.gY + 30,
            SECTION_END - SECTION_START,
            H - this.gY - 2,
          );

        buildAtmosphere() {

            wisp.y = fy;

        drawPowerLines() {
          let g = this.add.graphics().setDepth(14);
          g.lineStyle(1.5, 0x0a0c12, 0.85);
          for (let i = 0; i < this.lamps.length - 1; i++) {
            let x1 = this.lamps[i].x - 30,
              x2 = this.lamps[i + 1].x - 30;
            let topY = this.gY - 168;
            let sag = (x2 - x1) * 0.1;
            g.beginPath();
            g.moveTo(x1, topY);
            let steps = 14;
            for (let s = 1; s <= steps; s++) {
              let t = s / steps;
              let x = x1 + (x2 - x1) * t;
              let y = topY + Math.sin(t * Math.PI) * sag;
              g.lineTo(x, y);
            }
            g.strokePath();
          }
        }

        mkLamp(x, index) {
          // Pole (drawn) + bulb fixture sprite on top
          let g = this.add.graphics().setDepth(9);
          g.fillStyle(0x24263a, 1);
          g.fillRect(x - 3, this.gY - 170, 6, 170);
          g.fillRect(x - 34, this.gY - 170, 34, 5);

          let bulbKeys = [
            "lamp_bulb_yellow",
            "lamp_bulb_blue",
            "lamp_bulb_green",
            "lamp_bulb_orange",
          ];
          let bulbKey = bulbKeys[index % bulbKeys.length];
          let bulb = this.add
            .image(x - 21, this.gY - 178, bulbKey)
            .setOrigin(0.5, 1)
            .setDisplaySize(46, 38)
            .setDepth(10)
            .setTint(0x444a5c);
          this.lamps.push({ x, on: false, index, bulb, bulbKey });
        }

        turnLampOn(index) {
          if (index >= this.lamps.length || this.lamps[index].on) return;
          this.lamps[index].on = true;
          let x = this.lamps[index].x,
            y = this.gY;
          // Restore the bulb's natural color (remove the "off" tint)
          this.lamps[index].bulb.clearTint();

          let gl = this.add.graphics().setDepth(15);
          gl.fillStyle(0xd4780a, 0.052);
          gl.fillCircle(x - 22, y - 172, 215);
          gl.fillStyle(0xe08820, 0.098);
          gl.fillCircle(x - 22, y - 172, 130);
          gl.fillStyle(0xf09030, 0.185);
          gl.fillCircle(x - 22, y - 172, 70);
          let cone = this.add.graphics().setDepth(13);
          cone.fillStyle(0xd4780a, 0.042);
          cone.fillTriangle(
            x - 42,
            y - 164,
            x - 22,
            y - 164,
            x + 85,
            y,
            x - 140,
            y,
          );
          let ref = this.add.graphics().setDepth(12);
          ref.fillStyle(0xd4780a, 0.1);
          ref.fillEllipse(x - 22, y + 8, 175, 28);
          gl.alpha = 0;
          cone.alpha = 0;
          ref.alpha = 0;
          this.tweens.add({
            targets: [gl, cone, ref],
            alpha: 1,
            duration: 540,
            ease: "Power2",
          });
          this.cameras.main.flash(220, 255, 200, 100, false);
        }

        drawTram(x, y) {
          let g = this.add.graphics();
          g.fillStyle(0x1a1c2a, 1);
          g.fillRoundedRect(x, y, 228, 68, 4);
          g.fillStyle(0x12141e, 1);
          for (let i = 0; i < 4; i++)
            g.fillRect(x + 12 + i * 53, y + 10, 43, 28);
          g.fillStyle(0x0c0e18, 1);
          g.fillCircle(x + 36, y + 70, 13);
          g.fillCircle(x + 192, y + 70, 13);
          g.lineStyle(2, 0x20223a, 1);
          g.beginPath();
          g.moveTo(x + 114, y);
          g.lineTo(x + 114, y - 30);
          g.strokePath();
        }

        drawPits(visible) {
          this.eyePairs.forEach((ep) => {
            try {
              ep.destroy();
            } catch (e) {}
          });
          this.eyePairs = [];
          this.spikeImgs.forEach((s) => s.setVisible(visible));
          this.drawCreatures();

          this.pitZones.forEach((pit) => {
            let ex = (pit.x1 + pit.x2) / 2;
            let eyeG = this.add.graphics().setDepth(26);
            this.eyePairs.push(eyeG);
            let show = true;
            this.time.addEvent({
              delay: Phaser.Math.Between(1000, 2800),
              repeat: -1,
              callback: () => {
                show = !show;
                eyeG.clear();
                if (show) {
                  eyeG.fillStyle(0xff2200, 0.88);
                  eyeG.fillEllipse(ex - 9, this.gY + 65, 9, 5);
                  eyeG.fillEllipse(ex + 9, this.gY + 65, 9, 5);
                  eyeG.fillStyle(0xff5500, 0.14);
                  eyeG.fillEllipse(ex, this.gY + 65, 45, 18);
                }
              },
            });
          });
        }

        // Draws simple snake / scorpion silhouettes lurking in each pit —
        // an always-visible danger cue distinct from the lit-up spikes.
        drawCreatures() {
          let g = this.creatureG;
          g.clear();
          this.creatures.forEach((c) => {
            let wob = Math.sin(c.phase) * 6;
            if (c.type === "scorpion") {
              g.fillStyle(0x3a2418, 1);
              // body
              g.fillEllipse(c.cx + wob * 0.3, c.cy, 34, 14);
              // tail curling up
              g.lineStyle(5, 0x3a2418, 1);
              g.beginPath();
              g.moveTo(c.cx + 14 + wob * 0.3, c.cy - 2);
              g.lineTo(c.cx + 24 + wob * 0.3, c.cy - 14);
              g.lineTo(c.cx + 16 + wob * 0.3, c.cy - 24);
              g.strokePath();
              // stinger
              g.fillStyle(0x5a2e1a, 1);
              g.fillTriangle(
                c.cx + 16 + wob * 0.3,
                c.cy - 24,
                c.cx + 22 + wob * 0.3,
                c.cy - 30,
                c.cx + 10 + wob * 0.3,
                c.cy - 28,
              );
              // pincers
              g.fillStyle(0x3a2418, 1);
              g.fillEllipse(c.cx - 18 + wob * 0.3, c.cy - 4, 12, 7);
              g.fillEllipse(c.cx - 24 + wob * 0.3, c.cy + 2, 10, 6);
              // glowing eyes
              g.fillStyle(0xff3300, 0.9);
              g.fillCircle(c.cx - 12 + wob * 0.3, c.cy - 4, 2);
              g.fillCircle(c.cx - 8 + wob * 0.3, c.cy - 4, 2);
            } else {
              // snake — coiled body with a raised head
              g.fillStyle(0x2a3a20, 1);
              g.fillEllipse(c.cx + wob, c.cy + 6, 46, 12);
              g.fillEllipse(c.cx - 10 + wob * 0.6, c.cy, 28, 11);
              // raised head
              g.fillStyle(0x344a28, 1);
              g.fillEllipse(c.cx + 14 + wob, c.cy - 8, 16, 12);
              // glowing eyes
              g.fillStyle(0xffee44, 0.95);
              g.fillCircle(c.cx + 10 + wob, c.cy - 11, 2);
              g.fillCircle(c.cx + 18 + wob, c.cy - 11, 2);
              // tongue flick
              g.fillStyle(0xcc3333, 0.8);
              g.fillRect(c.cx + 22 + wob, c.cy - 8, 6, 1.5);
            }
          });
        }

        drawPond() {
          this.pondG.clear();
          let w = this.pondX2 - this.pondX1;
          // Deep water body
          this.pondG.fillStyle(0x0e2030, 1);
          this.pondG.fillRect(this.pondX1, this.gY, w, H - this.gY);
          // Gradient-ish shading toward the bottom
          this.pondG.fillStyle(0x081420, 0.6);
          this.pondG.fillRect(this.pondX1, this.gY + 60, w, H - this.gY - 60);
          // Rippling surface line
          this.pondG.lineStyle(2, 0x3a6080, 0.5);
          this.pondG.beginPath();
          let wx = this.pondX1;
          this.pondG.moveTo(wx, this.gY + 2);
          while (wx < this.pondX2) {
            wx += 24;
            let off = Math.sin((wx + (this._pondT || 0)) * 0.05) * 3;
            this.pondG.lineTo(wx, this.gY + 2 + off);
          }
          this.pondG.strokePath();
          // Faint highlight glints
          this.pondG.fillStyle(0x5a8aa8, 0.12);
          for (let gx = this.pondX1 + 30; gx < this.pondX2; gx += 70) {
            this.pondG.fillEllipse(gx, this.gY + 14, 36, 6);
          }
        }

        createPlayer() {
          this.player = this.add.sprite(160, this.gY, "stand").setDepth(60);
          setPlayerAnim(this.player, this, "stand");
        }

        setAnim(name) {
          setPlayerAnim(this.player, this, name);
        }

        showText(text, duration, callback) {
          if (!this.textQueue) this.textQueue = [];
          if (duration == null) duration = Math.max(2000, text.length * 65);
          this.textQueue.push({ text, duration, callback });
          if (!this.textActive) this._playNextText();
        }

        _playNextText() {
          if (!this.textQueue || this.textQueue.length === 0) {
            this.textActive = false;
            return;
          }
          this.textActive = true;
          let { text, duration, callback } = this.textQueue.shift();

          let t = this.add
            .text(W / 2, H - 29, text, {
              fontFamily: "EB Garamond",
              fontStyle: "italic",
              fontSize: "19px",
              color: "#ffffff",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(610)
            .setAlpha(0);
          this.tweens.add({
            targets: t,
            alpha: 1,
            duration: 700,
            onComplete: () => {
              this.time.delayedCall(duration, () => {
                this.tweens.add({
                  targets: t,
                  alpha: 0,
                  duration: 620,
                  onComplete: () => {
                    t.destroy();
                    if (callback) callback();
                    this._playNextText();
                  },
                });
              });
            },
          });
        }

        showPrompt(text) {
          if (this.interactPrompt) this.interactPrompt.destroy();
          let sx = this.player.x - this.cameras.main.scrollX;
          let sy = this.player.y - PLAYER_H - 22;
          this.interactPrompt = this.add
            .text(sx, sy, text, {
              fontFamily: "EB Garamond",
              fontSize: "14px",
              color: "#aabbcc",
              backgroundColor: "#00000099",
              padding: { x: 8, y: 4 },
            })
            .setOrigin(0.5)
            .setDepth(320)
            .setScrollFactor(0);
        }

        hidePrompt() {
          if (this.interactPrompt) {
            this.interactPrompt.destroy();
            this.interactPrompt = null;
          }
        }

        updateInventory() {
          if (this.inventoryText) this.inventoryText.destroy();
          let items = [];
          if (this.hasRod) items.push("⚡ Metal Rod");
          if (this.plates.rubber) items.push("⬛ Rubber Plate");
          if (this.plates.metal) items.push("⬜ Metal Plate");
          if (this.plates.wood) items.push("🟫 Wooden Plate");
          if (!items.length) return;
          this.inventoryText = this.add
            .text(16, 16, items.join("   "), {
              fontFamily: "EB Garamond",
              fontSize: "14px",
              color: "#7a8ea0",
              backgroundColor: "#00000099",
              padding: { x: 8, y: 5 },
            })
            .setScrollFactor(0)
            .setDepth(320);
        }

        die(type) {
          if (this.isDead) return;
          this.isDead = true;
          this.hidePrompt();
          this.setAnim("death");
          this.cameras.main.shake(320, 0.022);

          let fl = this.add
            .rectangle(
              W / 2,
              H / 2,
              W,
              H,
              type === "electric"
                ? 0x0e1e88
                : type === "water"
                  ? 0x0a2a44
                  : 0x000000,
              type === "electric" ? 0.55 : type === "water" ? 0.7 : 0.9,
            )
            .setScrollFactor(0)
            .setDepth(460)
            .setAlpha(
              type === "electric" ? 0.55 : type === "water" ? 0.7 : 0.9,
            );

          let dt = this.add
            .text(W / 2, H / 2, "...", {
              fontFamily: "EB Garamond",
              fontSize: "60px",
              color:
                type === "electric"
                  ? "#3355cc"
                  : type === "water"
                    ? "#4488aa"
                    : "#1c2a38",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(461)
            .setAlpha(0);

          this.tweens.add({ targets: dt, alpha: 1, duration: 330 });
          this.time.delayedCall(2100, () => {
            this.tweens.add({
              targets: [fl, dt],
              alpha: 0,
              duration: 680,
              onComplete: () => {
                fl.destroy();
                dt.destroy();
                this.respawn();
              },
            });
          });
        }

        respawn() {
          this.player.x = this.respawnX;
          this.player.y = this.respawnY;
          this.pVY = 0;
          this.isDead = false;
          this.setAnim("stand");
        }

        solvePuzzle1() {
          this.p1Solved = true;
          this.hasRod = false;
          this.hidePrompt();
          this.fuseBoxSparkG.clear();
          this.fuseBoxImg.setTint(0x1e4422);

          let ok = this.add.graphics().setDepth(20);
          ok.fillStyle(0x00ee44, 0.92);
          ok.fillCircle(this.fuseBoxX, this.fuseBoxY - 52, 10);

          this.cameras.main.flash(780, 255, 185, 80, false);

          this.time.delayedCall(180, () => this.turnLampOn(2));
          this.time.delayedCall(620, () => this.turnLampOn(3));
          this.time.delayedCall(1080, () => this.turnLampOn(4));
          this.time.delayedCall(400, () => this.drawPits(true));
          this.time.delayedCall(400, () => {
            this.tweens.add({
              targets: this.pitDarkness,
              alpha: 0,
              duration: 1400,
            });
          });

          this.respawnX = 1250;
          this.updateInventory();
          this.showText("The circuit is complete.", 2300, () => {
            this.showText("Now I can see what was hiding in the dark.", 3200);
          });
        }

        solvePuzzle2() {
          this.p2Solved = true;
          this.hidePrompt();

          this.cameras.main.flash(500, 80, 160, 255, false);

          this.time.delayedCall(340, () => this.turnLampOn(5));
          this.time.delayedCall(780, () => this.turnLampOn(6));

          this.respawnX = this.pondX1 - 60;
          this.updateInventory();
          this.showText("The rubber holds against the water.", 2300);
        }

        // Called once the player walks across the placed rubber plate and
        // reaches the far bank — the true end of the crossing.
        finishCrossing() {
          this.crossingFinished = true;
          this.showText("Solid ground.", 2200, () => {
            this.showText("Something else lies just ahead.", 2600);
          });
          // Fog thickens and the hole's glow begins to show through it
          this.tweens.add({ targets: this.holeFogG, alpha: 1, duration: 2400 });
          this.tweens.add({
            targets: this.holeGlowG,
            alpha: 1,
            duration: 2800,
            delay: 600,
          });
        }

        update(time, delta) {
          if (this.isDead) return;
          tickRain(this.rain, delta);
          tickGrain(this.grain, delta);

          this.arcTimer += delta;
          if (this.arcTimer > 160) {
            this.arcTimer = 0;
            this._pondT = (this._pondT || 0) + 8;
            this.drawPond();
          }

          if (this.creatures) {
            this.creatures.forEach((c) => (c.phase += delta * 0.003));
            this.drawCreatures();
          }

          if (this.ambientLines) {
            this.ambientLines.forEach((line) => {
              if (!line.shown && this.player.x >= line.x) {
                line.shown = true;
                this.showText(line.text, 2600);
              }
            });
          }

          this.movePlayer(delta);
          this.checkInteract();
          this.updatePrompt();

          // Touch: switch the action button to "F" (place plate) when at
          // the pond with a plate selected; otherwise it's "E" (interact).
          if (this.touch) {
            let wantF = this.nearPond && this.plateSelected;
            if (wantF !== this._touchIsF) {
              this._touchIsF = wantF;
              if (wantF) this.touch.setAction("F", "KeyF");
              else this.touch.setAction("E", "KeyE");
            }
          }
        }

        // Returns the ground surface Y at a given x, accounting for the
        // raised pillar-hop platforms and the pit gaps between them.
        // Returns null if px is over a pit (no ground — player falls through).
        groundYAt(px) {
          if (this.pillars) {
            for (let p of this.pillars) {
              if (px > p.x1 && px < p.x2) return p.top;
            }
          }
          if (this.pitZones) {
            for (let pit of this.pitZones) {
              if (px > pit.x1 && px < pit.x2) return null;
            }
          }
          // Pond gap: solid only where a (still-floating) plate is placed
          if (px > this.pondX1 && px < this.pondX2) {
            if (
              this.placedPlate &&
              this.placedPlate.floating &&
              Math.abs(px - this.placedPlate.x) < 70
            ) {
              return this.gY;
            }
            return null;
          }
          // The hole, just past the pond — opens once the crossing is done
          if (
            this.crossingFinished &&
            px > this.holeX - 85 &&
            px < this.holeX + 85
          ) {
            return null;
          }
          return this.gY;
        }

        movePlayer(delta) {
          if (this.holeFallen) return;
          let dt = delta / 1000;
          let px = this.player.x,
            py = this.player.y;
          let wasOnGround = this.onGround;

          this.pVY += this.gravity * dt;
          py += this.pVY * dt;

          let groundY = this.groundYAt(px);

          if (groundY !== null && py >= groundY) {
            if (!wasOnGround && this.pVY > 200) {
              this.isLanding = true;
              this.setAnim("land");
              this.player.once("animationcomplete", () => {
                this.isLanding = false;
              });
            }
            py = groundY;
            this.pVY = 0;
            this.onGround = true;
          } else {
            this.onGround = false;
          }

          let moving = false;
          if (!this.isLanding) {
            if (this.isFloating) {
              // Rafting: drift steadily toward the far bank; left/right nudges speed
              let driftSpeed = 70; // px/sec base drift
              let nudge = 0;
              if (this.cursors.left.isDown || this.wasd.A.isDown) {
                nudge = -40;
                this.player.setFlipX(true);
                moving = true;
              }
              if (this.cursors.right.isDown || this.wasd.D.isDown) {
                nudge = 40;
                this.player.setFlipX(false);
                moving = true;
              }
              px += (driftSpeed + nudge) * dt;
              px = Phaser.Math.Clamp(px, this.pondX1 + 5, this.pondX2 - 5);
            } else {
              if ((this.cursors.left.isDown || this.wasd.A.isDown) && px > 25) {
                px -= this.speed * dt;
                this.player.setFlipX(true);
                moving = true;
              }
              if (this.cursors.right.isDown || this.wasd.D.isDown) {
                px += this.speed * dt;
                this.player.setFlipX(false);
                moving = true;
              }
              if (
                (this.cursors.up.isDown ||
                  this.cursors.space.isDown ||
                  this.wasd.W.isDown) &&
                this.onGround
              ) {
                this.pVY = -390;
                this.setAnim("jump");
              }
            }
          }

          if (!this.isLanding) {
            if (!this.onGround) {
              this.setAnim(this.pVY < 0 ? "jump" : "fall");
            } else if (moving) {
              this.setAnim("run");
            } else {
              this.setAnim("stand");
            }
          }

          this.pitZones.forEach((pit) => {
            if (px > pit.x1 + 5 && px < pit.x2 - 5 && py >= this.gY - 10)
              this.die("pit");
          });
          if (
            px > this.pondX1 + 5 &&
            px < this.pondX2 - 5 &&
            py >= this.gY - 10 &&
            !this.isFloating
          ) {
            this.die("water");
          }

          // While rafting, keep the plate centered under the player and
          // gently bob it with the water
          if (this.isFloating && this.placedPlate) {
            this.placedPlate.x = px;
            this.placedPlate.img.clear();
            let colors = { rubber: 0x2a2a2a, metal: 0x8892a0, wood: 0x8a6840 };
            this.placedPlate.img.fillStyle(colors[this.placedPlate.type], 1);
            this.placedPlate.img.fillRoundedRect(
              px - 70,
              this.gY - 12,
              140,
              12,
              2,
            );
            this.placedPlate.img.lineStyle(1.5, 0xffffff, 0.18);
            this.placedPlate.img.strokeRoundedRect(
              px - 70,
              this.gY - 12,
              140,
              12,
              2,
            );

            if (px >= this.pondX2 - 5) {
              this.isFloating = false;
              if (this.placedPlate) {
                this.placedPlate.img.destroy();
                this.placedPlate = null;
              }
              this.solvePuzzle2();
              this.time.delayedCall(2600, () => this.finishCrossing());
            }
          }

          // ── Falling into the hole, just past the pond ──
          if (this.crossingFinished && !this.holeFallen) {
            if (!this.holeHintShown && Math.abs(px - this.holeX) < 260) {
              this.holeHintShown = true;
              this.showText("Something waits below.", 2400);
            }
            if (
              px > this.holeX - 85 &&
              px < this.holeX + 85 &&
              py >= this.gY - 6
            ) {
              this.holeFallen = true;
              this.setAnim("fall");
              this.cameras.main.shake(300, 0.01);
              this.tweens.add({
                targets: this.player,
                y: H + 100,
                duration: 1100,
                ease: "Cubic.In",
              });
              if (this.music)
                this.tweens.add({
                  targets: this.music,
                  volume: 0,
                  duration: 900,
                });
              this.time.delayedCall(700, () => {
                this.cameras.main.flash(450, 255, 180, 80, false);
              });
              this.time.delayedCall(1300, () => {
                this.cameras.main.fade(700, 0, 0, 0);
                this.time.delayedCall(700, () => {
                  this.scene.start("HeartChamberScene", { music: this.music });
                });
              });
            }
          }

          this.player.x = px;
          this.player.y = py;
        }

        checkInteract() {
          let px = this.player.x;

          if (
            !this.hasRod &&
            !this.rodCollected &&
            Math.abs(px - (this.rodX + 40)) < 80
          ) {
            this.nearRod = true;
            if (Phaser.Input.Keyboard.JustDown(this.eKey)) {
              this.rodCollected = true;
              this.hasRod = true;
              this.rodG.setVisible(false);
              this.updateInventory();
              this.showText("It's a metal rod.", 2000);
            }
          } else {
            this.nearRod = false;
          }

          if (!this.p1Solved && Math.abs(px - this.fuseBoxX) < 80) {
            this.nearFuseBox = true;
            if (Phaser.Input.Keyboard.JustDown(this.eKey)) {
              if (this.hasRod) {
                this.solvePuzzle1();
              } else {
                this.fuseAttempts++;
                if (this.fuseAttempts === 1) {
                  this.showText("It's broken. Something is missing.", 2200);
                } else if (this.fuseAttempts >= 2) {
                  this.showText(
                    "I need something to bridge the connection — maybe I can find it nearby.",
                    2800,
                  );
                }
              }
            }
          } else {
            this.nearFuseBox = false;
          }

          // ── Plate pickups (rubber / metal / wood) ──
          this.nearPlate = null;
          Object.entries(this.plateDefs).forEach(([type, def]) => {
            if (this.plates[type]) return;
            if (Math.abs(px - def.x) < 60) {
              this.nearPlate = type;
              if (Phaser.Input.Keyboard.JustDown(this.eKey)) {
                this.plates[type] = true;
                this.plateIcons[type].setVisible(false);
                this.tweens.killTweensOf(this.plateIcons[type]);
                this.updateInventory();
                this.showText("It's a " + def.label.toLowerCase() + ".", 1800);
              }
            }
          });

          // ── Pond edge: cycle + place a plate ──
          this.nearPond =
            !this.p2Solved &&
            px > this.pondX1 - 90 &&
            px < this.pondX1 + 10 &&
            !this.placedPlate;
          if (this.nearPond) {
            let haveAny = this.plateOrder.some((t) => this.plates[t]);
            if (haveAny) {
              if (!this.pondHintShown) {
                this.pondHintShown = true;
                this.showText(
                  "Press [E] to choose a plate, then [F] to lay it down.",
                  3200,
                );
              }
              if (Phaser.Input.Keyboard.JustDown(this.eKey)) {
                // cycle to the next plate the player actually has
                if (!this.plateSelected) {
                  this.plateSelected = true;
                  // start from the first plate the player has, without
                  // auto-defaulting to rubber
                  this.plateSelectIndex = -1;
                }
                for (let n = 0; n < this.plateOrder.length; n++) {
                  this.plateSelectIndex =
                    (this.plateSelectIndex + 1) % this.plateOrder.length;
                  if (this.plates[this.plateOrder[this.plateSelectIndex]])
                    break;
                }
              }
              if (
                this.plateSelected &&
                Phaser.Input.Keyboard.JustDown(this.fKey)
              ) {
                let type = this.plateOrder[this.plateSelectIndex];
                if (this.plates[type]) this.placePlate(type);
              }
            }
          }
        }

        // Places the chosen plate across the pond. Rubber floats and forms
        // a walkable bridge; metal and wood sink and pull the player under
        // if they're stepped on.
        placePlate(type) {
          let floating = type === "rubber";
          let spawnX = floating
            ? this.player.x
            : (this.pondX1 + this.pondX2) / 2;

          let img = this.add.graphics().setDepth(25);
          let colors = {
            rubber: 0x2a2a2a,
            metal: 0x8892a0,
            wood: 0x8a6840,
          };
          img.fillStyle(colors[type], 1);
          img.fillRoundedRect(spawnX - 70, this.gY - 12, 140, 12, 2);
          img.lineStyle(1.5, 0xffffff, 0.18);
          img.strokeRoundedRect(spawnX - 70, this.gY - 12, 140, 12, 2);

          this.placedPlate = { type, img, x: spawnX, floating };
          this.plates[type] = false;
          this.updateInventory();

          if (floating) {
            this.isFloating = true;
            this.showText("It holds. I can ride it across.", 2400);
          } else {
            this.showText("It's sinking!", 1600);
            this.tweens.add({
              targets: img,
              y: 120,
              alpha: 0,
              duration: 1100,
              ease: "Cubic.In",
              onComplete: () => {
                img.destroy();
                this.placedPlate.floating = false;
                this.placedPlate = null;
                this.showText("That won't hold. I need something else.", 2400);
              },
            });
          }
        }

        updatePrompt() {
          let px = this.player.x;
          let sx = px - this.cameras.main.scrollX;
          let sy = this.player.y - PLAYER_H - 22;

          if (
            !this.hasRod &&
            !this.rodCollected &&
            Math.abs(px - (this.rodX + 40)) < 80
          )
            this.showPrompt("[E]  Pick up metal rod");
          else if (this.nearFuseBox && this.hasRod)
            this.showPrompt("[E]  Connect rod to fuse box");
          else if (this.nearFuseBox && !this.hasRod)
            this.showPrompt("Something is broken here...");
          else if (this.nearPlate)
            this.showPrompt(
              "[E]  Pick up " + this.plateDefs[this.nearPlate].label,
            );
          else if (this.nearPond) {
            let haveAny = this.plateOrder.some((t) => this.plates[t]);
            if (haveAny) {
              if (!this.plateSelected) {
                this.showPrompt("[E]  Choose a plate");
              } else {
                let cur = this.plateOrder[this.plateSelectIndex];
                let label = this.plates[cur]
                  ? this.plateDefs[cur].label
                  : "...";
                this.showPrompt("[E]  Cycle   [F]  Place — " + label);
              }
            } else {
              this.showPrompt("The water is too deep to cross like this.");
            }
          } else this.hidePrompt();

          if (this.interactPrompt) {
            this.interactPrompt.x = sx;
            this.interactPrompt.y = sy;
          }
        }
      }

      // ════════════════════════════════════════════════════════════════
      // HEART CHAMBER SCENE — the climax. A vast dormant power station
      // with three generators to restore before the Heart can beat again.
      // ════════════════════════════════════════════════════════════════
      class HeartChamberScene extends Phaser.Scene {
        constructor() {
          super({ key: "HeartChamberScene" });
        }

        init(data) {
          this.passedMusic = data && data.music;
        }

        create() {
          this.cameras.main.setBackgroundColor("#05060c");
          this.music = this.passedMusic;
          this.worldW = 3600;
          this.gY = 600;
          this.pVY = 0;
          this.gravity = 900;
          this.onGround = true;
          this.isLanding = false;
          this.isDead = false;
          this.isFrozen = false;
          this.speed = 210;
          this.curAnim = null;
          this.respawnX = 80;
          this.respawnY = this.gY;
          this.eyePairs = [];

          this.genA = { active: false, x: 520 };
          this.genB = { active: false, x: 1320 };
          this.genC = { active: false, x: 2120 };
          this.genAPits = [];
          this.genBZone = { x1: 1430, x2: 1640 };
          this.genCZone = { x1: 2230, x2: 2460 };
          this.gateX1 = 2720;
          this.gateOpen = false;
          this.heartX = 3260;
          this.leverPulled = false;
          this.allActive = false;

          this.buildChamber();
          this.buildGenerators();
          this.buildHeartMachine();

          this.createPlayer();

          this.cameras.main.setBounds(0, 0, this.worldW, H);
          this.cameras.main.startFollow(this.player, true, 0.06, 0.06);
          this.cursors = this.input.keyboard.createCursorKeys();
          this.wasd = this.input.keyboard.addKeys("W,A,S,D");
          this.eKey = this.input.keyboard.addKey("E");

          mkVignette(this, 175);
          mkBars(this, 600);
          this.grain = mkGrain(this, 560);
          this.touch = mkTouchControls(this, "E");

          this.music = this.passedMusic;
          if (this.music && this.music.isPlaying) {
            this.tweens.add({
              targets: this.music,
              volume: 0.05,
              duration: 2000,
            });
          }

          this.cameras.main.fadeIn(2400);
          this.time.delayedCall(2000, () =>
            this.showText("Even sleeping hearts remember how to beat.", 3600),
          );
        }

        // ── Background: machine cathedral ────────────────────────────
        buildChamber() {
          let bg = this.add.graphics();
          bg.fillStyle(0x05060c, 1);
          bg.fillRect(0, 0, this.worldW, H);

          // Darkness swallowing the ceiling
          let ceil = this.add.graphics().setDepth(0.5);
          ceil.fillGradientStyle(
            0x000000,
            0x000000,
            0x000000,
            0x000000,
            1,
            1,
            0,
            0,
          );
          ceil.fillRect(0, 0, this.worldW, H * 0.55);

          // Floor
          let floorG = this.add.graphics().setDepth(1);
          floorG.fillStyle(0x0a0c14, 1);
          floorG.fillRect(0, this.gY, this.worldW, H - this.gY);
          for (let x = 0; x < this.worldW; x += 140) {
            this.add
              .image(
                x,
                this.gY,
                "ground_flat" + ((Math.floor(x / 140) % 10) + 1),
              )
              .setOrigin(0, 0)
              .setDisplaySize(140, 140)
              .setDepth(1)
              .setTint(0x1a2230)
              .setAlpha(0.7);
          }

          // Massive background gears, slowly rotating once awakened
          this.bgGears = [];
          [
            { x: 350, y: 220, key: "gear_large", size: 320, spd: 0 },
            { x: 1700, y: 180, key: "gear_medium", size: 220, spd: 0 },

        drawCables(charge) {
          this.cableG.clear();
          let color = charge > 0 ? 0xd4780a : 0x161c28;
          let alpha = charge > 0 ? 0.5 * charge : 0.6;
          for (let i = 0; i < 4; i++) {
            let y = this.gY - 300 + i * 26;
            this.cableG.lineStyle(3, color, alpha);
            this.cableG.beginPath();
            let x = -50;
            this.cableG.moveTo(x, y);
            while (x < this.worldW + 50) {
              x += 180;
              let sag = Math.sin(x * 0.01 + i) * 8;
              this.cableG.lineTo(x, y + sag);
            }
            this.cableG.strokePath();
          }

        // ── Three generator stations ──────────────────────────────────
        buildGenerators() {
          // ═══ GENERATOR A — restores visibility, reveals hidden gaps ═══
          this.add
            .image(this.genA.x, this.gY - 40, "panel_console1")
            .setOrigin(0.5, 1)
            .setDisplaySize(90, 110)
            .setDepth(5);
          this.add
            .image(this.genA.x, this.gY - 150, "sign_warning_triangle")
            .setOrigin(0.5, 1)
            .setDisplaySize(36, 36)
            .setDepth(5);
          this.genA.switchImg = this.add
            .image(this.genA.x + 60, this.gY - 8, "switch_blue_off")
            .setOrigin(0.5, 1)
            .setDisplaySize(60, 64)
            .setDepth(5);

          // Hidden gap zone — looks like solid dark floor until activated
          const GAP_START = 650;
          const PILLAR_W = 95;
          const GAP_W = 100;
          this.genA.pillars = [];
          this.genAPits = [];
          let gx = GAP_START;
          for (let n = 0; n < 3; n++) {
            this.genA.pillars.push({
              x1: gx,
              x2: gx + PILLAR_W,
              top: this.gY - 28,
            });
            gx += PILLAR_W;
            if (n < 2) {
              this.genAPits.push({ x1: gx, x2: gx + GAP_W });
              gx += GAP_W;
            }
          }
          this.genA.sectionEnd = gx;
          // The middle pillar retracts on a cycle once active — forces a
          // timed double-jump rather than a casual stroll across.
          this.genA.flickerCycle = 0;
          this.genA.flickerLen = 1700; // ms
          this.genA.flickerOnFrac = 0.55; // fraction of cycle the middle pillar is solid

          // Void beneath the gap section
          let voidG = this.add.graphics().setDepth(1);
          voidG.fillStyle(0x020308, 1);
          voidG.fillRect(
            GAP_START,
            this.gY + 4,
            gx - GAP_START,
            H - this.gY - 2,
          );

          // Pillar tops — revealed (bright) once Generator A activates
          this.genA.pillarImgs = this.genA.pillars.map((p) =>
            this.add
              .image(p.x1, p.top, "ground_flat3")
              .setOrigin(0, 0)
              .setDisplaySize(PILLAR_W, 32)
              .setDepth(2)
              .setAlpha(0.08),
          );
          this.genA.pillarBodyImgs = this.genA.pillars.map((p) =>
            this.add
              .image(p.x1, p.top, "block_plain2")
              .setOrigin(0, 0)
              .setDisplaySize(PILLAR_W, this.gY - p.top + 8)
              .setDepth(2)
              .setAlpha(0.08),
          );

          // Darkness overlay over the gap section — lifts on activation
          this.genA.darkness = this.add.graphics().setDepth(25);
          this.genA.darkness.fillStyle(0x000000, 0.92);
          this.genA.darkness.fillRect(
            GAP_START - 40,
            0,
            gx - GAP_START + 80,
            H,
          );

          // ═══ GENERATOR B — insulation crossing ═══
          this.add
            .image(this.genB.x, this.gY - 40, "panel_console1")
            .setOrigin(0.5, 1)
            .setDisplaySize(90, 110)
            .setDepth(5);
          this.add
            .image(this.genB.x, this.gY - 150, "sign_power")
            .setOrigin(0.5, 1)
            .setDisplaySize(36, 36)
            .setDepth(5);
          this.genB.switchImg = this.add
            .image(this.genB.x + 60, this.gY - 8, "switch_yellow_off")
            .setOrigin(0.5, 1)
            .setDisplaySize(60, 64)
            .setDepth(5);

          // Electrified strip — hazard tape framing
          this.add
            .image(this.genBZone.x1, this.gY - 30, "hazard_orange1")
            .setOrigin(0.5, 1)
            .setDisplaySize(60, 60)
            .setDepth(21);
          this.add
            .image(this.genBZone.x2, this.gY - 30, "hazard_orange1")
            .setOrigin(0.5, 1)
            .setDisplaySize(60, 60)
            .setFlipX(true)
            .setDepth(21);
          this.genB.arcG = this.add.graphics().setDepth(20);
          this.genB.arcTimer = 0;
          this.drawGenBArc();

          // Insulated walkway — flashes in once activated, but the
          // insulation only holds for a short window before decaying
          // back to a live current.
          this.genB.insul = this.add.graphics().setDepth(22).setAlpha(0);
          this.genB.insul.fillStyle(0x2a2a2a, 1);
          this.genB.insul.fillRoundedRect(
            this.genBZone.x1 - 6,
            this.gY - 12,
            this.genBZone.x2 - this.genBZone.x1 + 12,
            12,
            2,
          );
          this.genB.safeWindow = 0; // ms remaining of safety after activation
          this.genB.safeWindowTotal = 2200;

          // ═══ GENERATOR C — timing relay ═══
          this.add
            .image(this.genC.x, this.gY - 40, "panel_console1")
            .setOrigin(0.5, 1)
            .setDisplaySize(90, 110)
            .setDepth(5);
          this.add
            .image(this.genC.x, this.gY - 150, "sign_diamond")
            .setOrigin(0.5, 1)
            .setDisplaySize(36, 36)
            .setDepth(5);
          this.genC.switchImg = this.add
            .image(this.genC.x + 60, this.gY - 8, "switch_orange_warning")
            .setOrigin(0.5, 1)
            .setDisplaySize(60, 64)
            .setDepth(5);

          this.add
            .image(this.genCZone.x1, this.gY - 30, "hazard_yellow1")
            .setOrigin(0.5, 1)
            .setDisplaySize(60, 60)
            .setDepth(21);
          this.add
            .image(this.genCZone.x2, this.gY - 30, "hazard_yellow1")
            .setOrigin(0.5, 1)
            .setDisplaySize(60, 60)
            .setFlipX(true)
            .setDepth(21);

          this.genC.gateG = this.add.graphics().setDepth(20);
          this.genC.cycle = 0; // 0..1, position in the pulse cycle
          this.genC.cycleLen = 1700; // ms
          this.genC.safeFrac = 0.62; // fraction of cycle that is safe
          this.drawGenCGate(0);

          // ═══ GATE before the Heart Machine — opens once all 3 active ═══
          this.gateImg = this.add
            .image(this.gateX1, this.gY, "panel_large1")
            .setOrigin(0.5, 1)
            .setDisplaySize(140, 280)

          this.add
