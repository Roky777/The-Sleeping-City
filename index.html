    <div id="rotate-overlay">
      Rotate your device to landscape to play The Sleeping City.
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>

    <script>
      const W = 1280,
        H = 720;
      const PLAYER_H = 76; // smaller character — world feels bigger, journey takes longer

      // Per-animation metrics (measured from the actual sprite art inside each frame):
      // charH = character pixel height, ox/oy = origin so feet plant on the ground.
      const PLAYER_ANIMS = {
        stand: { charH: 114, ox: 0.5, oy: 0.984 },
        run: { charH: 83, ox: 0.5, oy: 0.978 },
        jump: { charH: 123, ox: 0.5, oy: 0.985 },
        fall: { charH: 140, ox: 0.5, oy: 0.986 },
        land: { charH: 146, ox: 0.5, oy: 0.987 },
        death: { charH: 134, ox: 0.5, oy: 0.986 },
      };

      // Apply correct scale + origin for a given animation, then play it.
      // Keeps the character a constant on-screen size with feet planted.
      function setPlayerAnim(sprite, state, name) {
        if (state.curAnim === name) return;
        state.curAnim = name;
        let m = PLAYER_ANIMS[name];
        sprite.setScale(PLAYER_H / m.charH);
        sprite.setOrigin(m.ox, m.oy);
        sprite.play("anim_" + name, true);
      }

      // ════════════════════════════════════════════════════════════════
      // SHARED HELPERS
      // ════════════════════════════════════════════════════════════════

      // groundScreenY: screen-space Y where drops splash. If omitted, no splashes.
      function mkRain(scene, count, depth, groundScreenY) {
        let g = scene.add.graphics().setScrollFactor(0).setDepth(depth);
        let drops = [];
        for (let i = 0; i < count; i++) {
          drops.push({
            x: Phaser.Math.Between(0, W),
            y: Phaser.Math.Between(0, H),
            spd: Phaser.Math.FloatBetween(480, 920),
            len: Phaser.Math.Between(10, 28),
            a: Phaser.Math.FloatBetween(0.07, 0.26),
          });
        }
        return { g, drops, splashes: [], groundY: groundScreenY || null };
      }

      function tickRain(rain, delta) {
        rain.g.clear();
        let gy = rain.groundY;
        rain.drops.forEach((d) => {
          d.y += (d.spd * delta) / 1000;
          d.x -= (d.spd * 0.17 * delta) / 1000;
          if (gy && d.y >= gy) {
            rain.splashes.push({ x: d.x, y: gy, r: 1, life: 1 });
            d.y = -20;
            d.x = Phaser.Math.Between(0, W);
          }
          if (d.y > H + 10) {
            d.y = -20;
            d.x = Phaser.Math.Between(0, W);
          }
          if (d.x < -10) d.x = W + 10;
          rain.g.lineStyle(1, 0x9aaabb, d.a);
          rain.g.beginPath();
          rain.g.moveTo(d.x, d.y);
          rain.g.lineTo(d.x - 4, d.y + d.len);
          rain.g.strokePath();
        });
        for (let i = rain.splashes.length - 1; i >= 0; i--) {
          let s = rain.splashes[i];
          s.r += delta * 0.045;
          s.life -= delta / 480;
          if (s.life <= 0) {
            rain.splashes.splice(i, 1);
            continue;
          }
          rain.g.lineStyle(1, 0xaaccdd, 0.22 * s.life);
          rain.g.strokeEllipse(s.x, s.y, s.r * 2.4, s.r * 0.9);
        }
      }

      function mkGrain(scene, depth) {
        return {
          g: scene.add.graphics().setScrollFactor(0).setDepth(depth),
          t: 0,
        };
      }

      function tickGrain(gr, delta) {
        gr.t += delta;
        if (gr.t < 50) return;
        gr.t = 0;
        gr.g.clear();
        for (let i = 0; i < 380; i++) {
          gr.g.fillStyle(
            Math.random() > 0.55 ? 0x6688aa : 0xffffff,
            Phaser.Math.FloatBetween(0.006, 0.028),
          );
          gr.g.fillRect(
            Phaser.Math.Between(0, W),
            Phaser.Math.Between(0, H),
            1,
            1,
          );
        }
      }

      function mkVignette(scene, depth) {
        let v = scene.add.graphics().setScrollFactor(0).setDepth(depth);
        v.fillGradientStyle(
          0x000000,
          0x000000,
          0x000000,
          0x000000,
          0.92,
          0,
          0.92,
          0,
        );
        v.fillRect(0, 0, 220, H);
        v.fillGradientStyle(
          0x000000,
          0x000000,
          0x000000,
          0x000000,
          0,
          0.92,
          0,
          0.92,
        );
        v.fillRect(W - 220, 0, 220, H);
        v.fillGradientStyle(
          0x000000,
          0x000000,
          0x000000,
          0x000000,
          0.78,
          0.78,
          0,
          0,
        );
        v.fillRect(0, 0, W, 160);
        v.fillGradientStyle(
          0x000000,
          0x000000,
          0x000000,
          0x000000,
          0,
          0,
          0.68,
          0.68,
        );
        v.fillRect(0, H - 105, W, 105);
      }

      // Cinematic letterbox — THE signature look of Inside / Limbo
      function mkBars(scene, depth) {
        let b = scene.add.graphics().setScrollFactor(0).setDepth(depth);
        b.fillStyle(0x000000, 1);
        b.fillRect(0, 0, W, 58);
        b.fillRect(0, H - 58, W, 58);
      }

      // ════════════════════════════════════════════════════════════════
      // TOUCH CONTROLS — on-screen buttons for touch devices. Dispatches
      // synthetic keyboard events so existing cursors/addKey logic in every
      // scene works unchanged (ArrowLeft/Right/Up, E, F).
      // ════════════════════════════════════════════════════════════════
      function isTouchDevice() {
        return (
          "ontouchstart" in window ||
          navigator.maxTouchPoints > 0 ||
          (window.matchMedia && window.matchMedia("(pointer: coarse)").matches)
        );
      }

      function sendKey(type, code) {
        window.dispatchEvent(
          new KeyboardEvent(type, { code, key: code, bubbles: true }),
        );
      }

      // `actionLabel` may be a string (static) — lets scenes show "E" vs "F"
      // via setAction() called from update() for contextual buttons.
      function mkTouchControls(scene, actionLabel) {
        if (!isTouchDevice()) return null;

        const mkBtn = (x, y, r, label, codeDown, codeUp) => {
          let g = scene.add
            .circle(x, y, r, 0xffffff, 0.08)
            .setScrollFactor(0)
            .setDepth(900)
            .setStrokeStyle(2, 0xffffff, 0.25)
            .setInteractive();
          let t = scene.add
            .text(x, y, label, {
              fontFamily: "EB Garamond",
              fontSize: "22px",
              color: "#ffffff",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(901)
            .setAlpha(0.7);

          g.on("pointerdown", () => {
            g.setFillStyle(0xffffff, 0.22);
            sendKey("keydown", codeDown);
          });
          const release = () => {
            g.setFillStyle(0xffffff, 0.08);
            sendKey("keyup", codeUp || codeDown);
          };
          g.on("pointerup", release);
          g.on("pointerout", release);

          return { g, t };
        };

        const R = 38;
        const leftBtn = mkBtn(70, H - 90, R, "◀", "ArrowLeft");
        const rightBtn = mkBtn(160, H - 90, R, "▶", "ArrowRight");
        const jumpBtn = mkBtn(W - 70, H - 160, R, "▲", "ArrowUp");
        const actionBtn = mkBtn(W - 160, H - 90, R + 6, "E", "KeyE");

        // Allow scenes to relabel/retarget the action button contextually
        const setAction = (label, code) => {
          actionBtn.t.setText(label);
          actionBtn.g.removeAllListeners();
          actionBtn.g.on("pointerdown", () => {
            actionBtn.g.setFillStyle(0xffffff, 0.22);
            sendKey("keydown", code);
          });
          const release = () => {
            actionBtn.g.setFillStyle(0xffffff, 0.08);
            sendKey("keyup", code);
          };
          actionBtn.g.on("pointerup", release);
          actionBtn.g.on("pointerout", release);
        };

        if (typeof actionLabel === "string") setAction(actionLabel, "KeyE");

        return {
          leftBtn,
          rightBtn,
          jumpBtn,
          actionBtn,
          setAction,
          destroy() {
            [leftBtn, rightBtn, jumpBtn, actionBtn].forEach(({ g, t }) => {
              g.destroy();
              t.destroy();
            });
          },
        };
      }

      // ════════════════════════════════════════════════════════════════
      // TITLE SCENE — black screen, ambient swell, cinematic reveal
      // ════════════════════════════════════════════════════════════════
      class TitleScene extends Phaser.Scene {
        constructor() {
          super({ key: "TitleScene" });
        }

        create() {
          this.cameras.main.setBackgroundColor("#000000");

          // Ambient opening music — fades in from silence
          if (this.cache.audio.exists("ambientOpening")) {
            this.music = this.sound.add("ambientOpening", {
              loop: true,
              volume: 0,
            });
            this.music.play();
            this.tweens.add({
              targets: this.music,
              volume: 0.55,
              duration: 6000,
            });
          }

          // Distant rain — fades in slightly later
          if (this.cache.audio.exists("rainSfx")) {
            this.rainSnd = this.sound.add("rainSfx", { loop: true, volume: 0 });
            this.rainSnd.play();
            this.tweens.add({
              targets: this.rainSnd,
              volume: 0.18,
              duration: 5000,
              delay: 1500,
            });
          }

          // Very subtle wind
          if (this.cache.audio.exists("windHowl")) {
            this.windSnd = this.sound.add("windHowl", {
              loop: true,
              volume: 0,
            });
            this.windSnd.play();
            this.tweens.add({
              targets: this.windSnd,
              volume: 0.08,
              duration: 7000,
              delay: 1000,
            });
          }

          // Pure black base
          this.add.rectangle(W / 2, H / 2, W, H, 0x000000).setDepth(0);

          // Subtle grain over black — texture, not emptiness
          this.grain = mkGrain(this, 5);

          // Title — fades in after a beat of darkness

            .text(W / 2, H / 2 - 56, "THE SLEEPING CITY", {
              fontFamily: "Cinzel",
              fontSize: "64px",
              color: "#c8a050",
              letterSpacing: 4,
            })
            .setOrigin(0.5)
            .setAlpha(0)
            .setDepth(30);

          let subtitle = this.add
            .text(
              W / 2,
              H / 2 + 24,
              "Some cities sleep. Others are forgotten.",
              {
                fontFamily: "EB Garamond",
                fontStyle: "italic",
                fontSize: "21px",
                color: "#5a6e80",
              },
            )
            .setOrigin(0.5)
            .setAlpha(0)
            .setDepth(30);

          let press = this.add
            .text(W / 2, H - 90, "Press Any Key", {
              fontFamily: "EB Garamond",
              fontSize: "15px",
              color: "#3a4a58",
              letterSpacing: 3,
            })
            .setOrigin(0.5)
            .setAlpha(0)
            .setDepth(30);

          this.add
            .text(
              W / 2,
              H - 36,
              "Designed by Roky Paul  |  Null Paradox  |  PW Games × IOI Hackathon",
              {
                fontFamily: "EB Garamond",
                fontSize: "12px",
                color: "#1c2630",
              },
            )
            .setOrigin(0.5)
            .setDepth(30);

          // Sequence: ~3.5s black & sound → title fades in → subtitle → press any key
          this.tweens.add({
            targets: title,
            alpha: 1,
            duration: 3000,
            delay: 3500,
          });
          this.tweens.add({
            targets: subtitle,
            alpha: 1,
            duration: 2200,
            delay: 5800,
          });
          this.time.delayedCall(8200, () => {
            this.tweens.add({
              targets: press,
              alpha: { from: 0, to: 0.7 },
              duration: 1100,
              yoyo: true,
              repeat: -1,
            });
          });

          this.input.keyboard.once("keydown", () => {
            console.log("Key pressed - starting game");
            this.cameras.main.fade(1800, 0, 0, 0);
            if (this.music)
              this.tweens.add({
                targets: this.music,
                volume: 0.15,
                duration: 1800,
              });
            this.time.delayedCall(1800, () => {
              this.scene.start("OutsideScene", {
                music: this.music,
                rainSnd: this.rainSnd,
                windSnd: this.windSnd,
              });
            });
          });

          this.input.once("pointerdown", () => {
            console.log("Click - starting game");
            this.cameras.main.fade(1800, 0, 0, 0);
            if (this.music)
              this.tweens.add({
                targets: this.music,
                volume: 0.15,
                duration: 1800,
              });
            this.time.delayedCall(1800, () => {
              this.scene.start("OutsideScene", {
                music: this.music,
                rainSnd: this.rainSnd,
                windSnd: this.windSnd,
              });
            });
          });
        }

        update(time, delta) {
          tickGrain(this.grain, delta);
        }
      }

      // ════════════════════════════════════════════════════════════════
      // OUTSIDE SCENE — the forest, the ancient tree, slow curious discovery
      // ════════════════════════════════════════════════════════════════
      class OutsideScene extends Phaser.Scene {
        constructor() {
          super({ key: "OutsideScene" });
        }

        init(data) {
          this.passedMusic = data && data.music;
          this.passedRain = data && data.rainSnd;
          this.passedWind = data && data.windSnd;
        }

        create() {
          this.cameras.main.setBackgroundColor("#0a0c14");
          this.worldW = 4200; // longer world — more time to walk
          this.gY = 588;
          this.pVY = 0;
          this.gravity = 900;
          this.onGround = true;
          this.speed = 150; // slower, deliberate pacing
          this.triggered = false;
          this.curAnim = null;

          // Carry audio over from the title screen
          this.music = this.passedMusic;
          this.rainSnd = this.passedRain;
          this.windSnd = this.passedWind;
          if (this.rainSnd)
            this.tweens.add({
              targets: this.rainSnd,
              volume: 0.22,
              duration: 2000,
            });

          this.buildSky();
          this.buildParallaxTrees();
          this.buildGround();
          this.buildRuinsAndDecor();
          this.buildTree();
          this.buildCat();
          this.buildFireflies();

          this.player = this.add.sprite(110, this.gY, "stand").setDepth(55);
          setPlayerAnim(this.player, this, "stand");

          this.cameras.main.setBounds(0, 0, this.worldW, H);
          this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
          this.cursors = this.input.keyboard.createCursorKeys();
          this.wasd = this.input.keyboard.addKeys("W,A,S,D");

          this.rain = mkRain(this, 165, 130);
          mkVignette(this, 180);
          mkBars(this, 600);
          this.grain = mkGrain(this, 550);
          this.touch = mkTouchControls(this, "E");

          this.cameras.main.fadeIn(2500);

          // ── Curiosity-driven hint sequence (distance triggered) ──
          this.hints = [
            { x: 60, text: "The storm came suddenly tonight." },
            { x: 380, text: "Strange... the streetlamps never lit." },
            { x: 700, text: "Even the old lamp posts here have gone dark." },
            {
              x: 1050,
              text: "Someone built these ruins long before the city existed.",
            },
            {
              x: 1450,
              text: "Everything that once carried power... is silent now.",
            },
            {
              x: 1550,
              text: "A cat... sleeping so soundly, even in this storm.",
            },
            { x: 2250, text: "There — a warm light. The only one for miles." },
            { x: 2700, text: "That tree... it wasn't glowing a moment ago." },
            { x: 3150, text: "It feels like it's been waiting." },
            { x: 3550, text: "I should see what's inside." },
          ];
          this.hintsShown = new Set();

          // ── Tree-puzzle state ──
          this.puzzleSolved = false;
          this.puzzleOpen = false;
          this.lockedHintShown = false;
          this.eKey = this.input.keyboard.addKey("E");

          // ── Toy-mouse questline state ──
          this.collected = {
            battery: false,
            mouseHead: false,
            mouseTail: false,
          };
          this.collectedCount = 0;
          this.catAwake = false;
          this.mousePuzzleOpen = false;
          this.mousePuzzleSolved = false;
          this.mouseSequenceStarted = false;
          this.wakeCatTried = false;
          this.inventoryText = null;
          this.catWakeAttempts = 0;
          this.hintTimerStarted = false;

          this.buildCollectibles();
          this.buildHintButton();
          this.showControlsOverlay();
        }

        // ── Controls overlay — shown once at the start, dismiss with any key/click ──
        showControlsOverlay() {
          this.controlsBlocking = true;

          let overlay = this.add
            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.72)
            .setScrollFactor(0)
            .setDepth(800);

          let panel = this.add.graphics().setScrollFactor(0).setDepth(801);
          panel.fillStyle(0x10141c, 0.95);
          panel.fillRoundedRect(W / 2 - 260, H / 2 - 170, 520, 340, 10);
          panel.lineStyle(1.5, 0x3a4a60, 0.8);
          panel.strokeRoundedRect(W / 2 - 260, H / 2 - 170, 520, 340, 10);

          let elements = [overlay, panel];

          let title = this.add
            .text(W / 2, H / 2 - 138, "How to Play", {
              fontFamily: "Cinzel",
              fontSize: "26px",
              color: "#c8a050",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(802);
          elements.push(title);

          let rows = [
            ["← → / A D", "Move left / right"],
            ["↑ / W / Space", "Jump"],
            ["E", "Interact — pick up, use, open"],
            ["F", "Confirm a placed item (used later)"],
            ["Mouse", "Click to rotate / drag pieces in puzzles"],
          ];
          rows.forEach((row, i) => {
            let y = H / 2 - 84 + i * 38;
            let keyText = this.add
              .text(W / 2 - 230, y, row[0], {
                fontFamily: "EB Garamond",
                fontSize: "18px",
                color: "#e8c878",
                backgroundColor: "#00000066",
                padding: { x: 10, y: 5 },
              })
              .setOrigin(0, 0.5)
              .setScrollFactor(0)
              .setDepth(802);
            let descText = this.add
              .text(W / 2 + 10, y, row[1], {
                fontFamily: "EB Garamond",
                fontStyle: "italic",
                fontSize: "17px",
                color: "#aabbcc",
              })
              .setOrigin(0, 0.5)
              .setScrollFactor(0)
              .setDepth(802);
            elements.push(keyText, descText);
          });

          let press = this.add
            .text(W / 2, H / 2 + 140, "Press any key or click to begin", {
              fontFamily: "EB Garamond",
              fontStyle: "italic",
              fontSize: "15px",
              color: "#7a8ea0",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(802);
          elements.push(press);

          this.tweens.add({
            targets: press,
            alpha: { from: 0.4, to: 1 },
            duration: 900,
            yoyo: true,
            repeat: -1,
          });

          const dismiss = () => {
            this.controlsBlocking = false;
            this.tweens.add({
              targets: elements,
              alpha: 0,
              duration: 400,
              onComplete: () => elements.forEach((el) => el.destroy()),
            });
          };

          this.input.keyboard.once("keydown", dismiss);
          this.input.once("pointerdown", dismiss);
        }

        // ── SKY: storm clouds + occasional lightning ──
        buildSky() {
          let base = this.add.graphics();
          base.fillStyle(0x0a0c16, 1);
          base.fillRect(0, 0, this.worldW, H);

          this.time.addEvent({
            delay: Phaser.Math.Between(9000, 18000),
            loop: true,
            callback: () => {
              let flash = this.add
                .rectangle(W / 2, H / 2, W, H, 0xaabbee, 0)
                .setScrollFactor(0)
                .setDepth(170);
              this.tweens.add({
                targets: flash,
                alpha: { from: 0, to: 0.18 },
                duration: 90,
                yoyo: true,
                onComplete: () => flash.destroy(),
              });
              if (this.cache.audio.exists("thunderSfx")) {
                this.time.delayedCall(Phaser.Math.Between(300, 900), () => {
                  this.sound.play("thunderSfx", { volume: 0.35 });
                });
              }
            },
          });
        }

        // ── Background tree silhouettes — parallax depth ──
        buildParallaxTrees() {
          let topKeys = [
            "bgtop1",
            "bgtop2",
            "bgtop3",
            "bgtop4",
            "bgtop5",
            "bgtop6",
            "bgtop7",
            "bgtop8",
          ];
          for (let x = -100; x < this.worldW + 300; x += 340) {
            let key = topKeys[Phaser.Math.Between(0, topKeys.length - 1)];
            if (this.textures.exists(key)) {
              this.add
                .image(x, H - 250, key)
                .setOrigin(0, 1)
                .setDisplaySize(380, 240)
                .setScrollFactor(0.18)
                .setAlpha(0.5)
                .setTint(0x222840);
            }
          }
          let treeKeys = [
            "bgtree1",
            "bgtree2",
            "bgtree3",
            "bgtree4",
            "bgtree5",
            "bgtree6",
            "bgtree7",
            "bgtree8",
            "bgtree9",
          ];
          for (
            let x = -50;
            x < this.worldW + 200;
            x += Phaser.Math.Between(180, 260)
          ) {
            let key = treeKeys[Phaser.Math.Between(0, treeKeys.length - 1)];
            if (this.textures.exists(key)) {
              let h = Phaser.Math.Between(220, 340);
              this.add
                .image(x, this.gY + 4, key)
                .setOrigin(0.5, 1)
                .setDisplaySize(h * 0.5, h)
                .setScrollFactor(0.35)
                .setAlpha(0.6)
                .setTint(0x161e30);
            }
          }
        }

        // ── Ground with grass-top platform texture ──
        buildGround() {
          let g = this.add.graphics();
          // Gradient from dark soil at surface to near-black at bottom — avoids flat black void
          g.fillGradientStyle(
            0x1c2410,
            0x1c2410,
            0x05060a,
            0x05060a,
            1,
            1,
            1,
            1,
          );
          g.fillRect(0, this.gY, this.worldW, H - this.gY);
          g.fillStyle(0x141a0c, 1);
          g.fillRect(0, this.gY, this.worldW, 8);

          let groundKeys = [
            "fground5",
            "fground6",
            "fground7",
            "fground8",
            "fground9",
          ];
          for (let x = 0; x < this.worldW; x += 220) {
            let key = groundKeys[Phaser.Math.Between(0, groundKeys.length - 1)];
            if (this.textures.exists(key)) {
              this.add
                .image(x, this.gY + 6, key)
                .setOrigin(0, 1)
                .setDisplaySize(230, 40)
                .setAlpha(0.55)
                .setDepth(2);
            }
          }

          let grassKeys = ["fgrass1", "fgrass2", "fgrass3", "fgrass4"];
          for (let x = 20; x < this.worldW; x += Phaser.Math.Between(50, 110)) {
            let key = grassKeys[Phaser.Math.Between(0, grassKeys.length - 1)];
            if (this.textures.exists(key)) {
              this.add
                .image(x, this.gY + 2, key)
                .setOrigin(0.5, 1)
                .setDisplaySize(
                  Phaser.Math.Between(14, 26),
                  Phaser.Math.Between(28, 46),
                )
                .setAlpha(0.85)
                .setDepth(6)
                .setTint(0x445533);
            }
          }
        }

        // ── Ruins, pillars, stones, mushrooms, bushes, trees — storytelling scatter ──
        buildRuinsAndDecor() {
          if (this.textures.exists("ruin2")) {
            this.add
              .image(520, this.gY + 4, "ruin2")
              .setOrigin(0.5, 1)
              .setDisplaySize(290, 210)
              .setDepth(8)
              .setTint(0x3a3f55)
              .setAlpha(0.85);
          }
          if (this.textures.exists("ruin3")) {
            this.add
              .image(800, this.gY + 4, "ruin3")
              .setOrigin(0.5, 1)
              .setDisplaySize(220, 200)
              .setDepth(7)
              .setTint(0x343850)
              .setAlpha(0.8);
          }
          if (this.textures.exists("ruin1")) {
            this.add
              .image(1080, this.gY + 4, "ruin1")
              .setOrigin(0.5, 1)
              .setDisplaySize(200, 200)
              .setDepth(7)
              .setTint(0x383c52)
              .setAlpha(0.8);
          }

          let mpillarKeys = [
            "mpillar1",
            "mpillar2",
            "mpillar3",
            "mpillar4",
            "mpillar5",
            "mpillar6",
            "mpillar7",
          ];
          [260, 950, 1620, 2380, 3050, 3700].forEach((x, i) => {
            let key = mpillarKeys[i % mpillarKeys.length];
            if (this.textures.exists(key)) {
              this.add
                .image(x, this.gY + 4, key)
                .setOrigin(0.5, 1)
                .setDisplaySize(
                  Phaser.Math.Between(70, 110),
                  Phaser.Math.Between(50, 80),
                )
                .setDepth(6)
                .setTint(0x3c4258)
                .setAlpha(0.75);
            }
          });

          if (this.textures.exists("pillar1")) {
            this.add
              .image(1380, this.gY + 4, "pillar1")
              .setOrigin(0.5, 1)
              .setDisplaySize(280, 84)
              .setDepth(7)
              .setTint(0x40455c)
              .setAlpha(0.8);
          }
          if (this.textures.exists("pillar2")) {
            this.add
              .image(2920, this.gY + 4, "pillar2")
              .setOrigin(0.5, 1)
              .setDisplaySize(300, 105)
              .setDepth(7)
              .setTint(0x40455c)
              .setAlpha(0.8);
          }

          let stoneKeys = [
            "fstone1",
            "fstone2",
            "fstone3",
            "fstone4",
            "fstone5",
            "fstone6",
            "fstone7",
          ];
          for (let i = 0; i < 14; i++) {
            let x = Phaser.Math.Between(150, this.worldW - 150);
            let key = stoneKeys[Phaser.Math.Between(0, stoneKeys.length - 1)];
            if (this.textures.exists(key)) {
              this.add
                .image(x, this.gY + 4, key)
                .setOrigin(0.5, 1)
                .setDisplaySize(
                  Phaser.Math.Between(26, 50),
                  Phaser.Math.Between(16, 30),
                )
                .setDepth(5)
                .setTint(0x4a5068)
                .setAlpha(0.7);
            }
          }

          let mushKeys = ["mushroom1", "mushroom2", "mushroom3"];
          [430, 1240, 2060, 2880, 3420].forEach((x) => {
            let key = mushKeys[Phaser.Math.Between(0, mushKeys.length - 1)];
            if (this.textures.exists(key)) {
              this.add
                .image(x, this.gY + 2, key)
                .setOrigin(0.5, 1)
                .setDisplaySize(
                  Phaser.Math.Between(24, 38),
                  Phaser.Math.Between(16, 26),
                )
                .setDepth(6)
                .setTint(0x554840)
                .setAlpha(0.8);
            }
          });

          let bushKeys = ["fbush1", "fbush2", "fbush3"];
          for (
            let x = 100;
            x < this.worldW;
            x += Phaser.Math.Between(280, 420)
          ) {
            let key = bushKeys[Phaser.Math.Between(0, bushKeys.length - 1)];
            if (this.textures.exists(key)) {
              this.add
                .image(x, this.gY + 6, key)
                .setOrigin(0.5, 1)
                .setDisplaySize(
                  Phaser.Math.Between(60, 100),
                  Phaser.Math.Between(40, 68),
                )
                .setDepth(56)
                .setTint(0x2e3a28)
                .setAlpha(0.9);
            }
          }

          // Different types of trees scattered — varied silhouettes
          let deadTreeKeys = ["ftree3", "ftree4", "ftree5"];
          let liveTreeKeys = ["ftree1", "ftree2"];
          let treePositions = [
            180, 640, 1180, 1750, 2180, 2620, 3080, 3520, 3900,
          ];
          treePositions.forEach((x, i) => {
            let isLive = i % 4 === 1;
            let key = isLive
              ? liveTreeKeys[Phaser.Math.Between(0, liveTreeKeys.length - 1)]
              : deadTreeKeys[Phaser.Math.Between(0, deadTreeKeys.length - 1)];
            if (this.textures.exists(key)) {
              let h = Phaser.Math.Between(280, 420);
              let img = this.add
                .image(x, this.gY + 4, key)
                .setOrigin(0.5, 1)
                .setDisplaySize(h * 0.6, h)
                .setDepth(isLive ? 4 : 9)
                .setAlpha(isLive ? 0.55 : 0.92);
              if (!isLive) img.setTint(0x14161e);
              else img.setTint(0x2a3322).setAlpha(0.5);
            }
          });

          if (this.textures.exists("board1")) {
            this.add
              .image(2480, this.gY + 2, "board1")
              .setOrigin(0.5, 1)
              .setDisplaySize(70, 90)
              .setDepth(8)
              .setTint(0x4a3c28)
              .setAlpha(0.85);
          }
          if (this.textures.exists("board2")) {
            this.add
              .image(3260, this.gY + 2, "board2")
              .setOrigin(0.5, 1)
              .setDisplaySize(60, 80)
              .setDepth(8)
              .setTint(0x4a3c28)
              .setAlpha(0.85);
          }

          // Dead lampposts — foreshadow the electricity theme
          [560, 1900, 3300].forEach((x) => this.drawDeadLamp(x, this.gY));
        }

        drawDeadLamp(x, y) {
          let g = this.add.graphics().setDepth(10);
          g.fillStyle(0x1c1e28, 1);
          g.fillRect(x - 3, y - 150, 6, 150);
          g.fillRect(x - 30, y - 150, 30, 5);
          g.fillStyle(0x181a22, 1);
          g.fillRect(x - 38, y - 158, 18, 12);

          // Very faint dead glass glint — flickers once, hints "almost alive"
          let glint = this.add.graphics().setDepth(11);
          this.time.addEvent({
            delay: Phaser.Math.Between(8000, 16000),
            loop: true,
            callback: () => {
              glint.clear();
              glint.fillStyle(0x556688, 0.18);
              glint.fillRect(x - 38, y - 158, 18, 12);
              this.tweens.add({
                targets: glint,
                alpha: { from: 1, to: 0 },
                duration: 600,
              });
            },
          });
        }

        // ── THE TREE (treehouse.png) — the portal ──
        buildTree() {
          this.treeX = 3950;
          this.treeY = this.gY;

          if (this.textures.exists("treehouse")) {
            this.treeImg = this.add
              .image(this.treeX, this.treeY + 4, "treehouse")
              .setOrigin(0.5, 1)
              .setDisplaySize(430, 403)
              .setDepth(20);
          } else {
            let g = this.add.graphics().setDepth(20);
            g.fillStyle(0x14100c, 1);
            g.fillRect(this.treeX - 25, this.treeY - 380, 50, 380);
          }

          // Approximate portal hole location (door area on treehouse art)
          this.holeX = this.treeX + 38;
          this.holeY = this.treeY - 60;

          // Glow pulsing — starts faint, ramps as player approaches
          this.glowG = this.add.graphics().setDepth(21);
          this.glowIntensity = 0;
          this.time.addEvent({
            delay: 30,
            loop: true,
            callback: () => {
              let v = (Math.sin(Date.now() * 0.0018) + 1) / 2;
              let amp = this.glowIntensity;
              this.glowG.clear();
              this.glowG.fillStyle(0xb05808, 0.05 * v * amp);
              this.glowG.fillEllipse(this.holeX, this.holeY, 240, 130);
              this.glowG.fillStyle(0xc86c10, 0.1 * v * amp);
              this.glowG.fillEllipse(this.holeX, this.holeY, 140, 75);
              this.glowG.fillStyle(0xdc8420, 0.2 * v * amp);
              this.glowG.fillEllipse(this.holeX, this.holeY, 75, 40);
              this.glowG.fillStyle(0xf09c3a, 0.4 * v * amp);
              this.glowG.fillEllipse(this.holeX, this.holeY, 36, 20);
            },
          });

          // Fireflies near tree
          if (this.textures.exists("fireflies")) {
            for (let i = 0; i < 5; i++) {
              let fx = this.treeX + Phaser.Math.Between(-180, 100);
              let fy = this.gY - Phaser.Math.Between(40, 220);
              let fly = this.add
                .image(fx, fy, "fireflies")
                .setDisplaySize(10, 5)
                .setDepth(22)
                .setAlpha(0);
              this.tweens.add({
                targets: fly,
                alpha: { from: 0, to: Phaser.Math.FloatBetween(0.4, 0.9) },
                duration: Phaser.Math.Between(800, 1600),
                yoyo: true,
                repeat: -1,
                delay: Phaser.Math.Between(0, 2000),
              });
              this.tweens.add({
                targets: fly,
                x: fx + Phaser.Math.Between(-40, 40),
                y: fy + Phaser.Math.Between(-30, 30),
                duration: Phaser.Math.Between(4000, 7000),
                yoyo: true,
                repeat: -1,
                ease: "Sine.InOut",
              });
            }
          }
        }

        // ── Sleeping cat — stays asleep until the toy mouse wakes it ──
        buildCat() {
          this.catX = 1620;
          this.cat = this.add
            .sprite(this.catX, this.gY - 2, "cat")
            .setOrigin(0.5, 1)
            .setDepth(54);
          this.cat.setDisplaySize(56, 56);
          this.cat.play("anim_cat_sleep");
        }

        // ════════════════════════════════════════════════════════════
        // COLLECTIBLES — Battery, Motor, Toy Mouse Body (drawn as icons)
        // Spread across distinct zones of the map so they don't feel like
        // a single cluster, with a soft glow ring under each for findability.
        // ════════════════════════════════════════════════════════════
        buildCollectibles() {
          // Battery — near the dead street lamp, early in the level
          this.batteryX = 560;
          this.batteryY = this.gY - 2;
          this.buildGlowMarker(this.batteryX, this.batteryY);
          this.batteryBeacon = this.buildItemBeacon(
            this.batteryX,
            this.batteryY,
          );
          this.batteryG = this.add.graphics().setDepth(30);
          this.drawBatteryIcon(
            this.batteryG,
            this.batteryX,
            this.batteryY,
            1.4,
          );
          this.tweens.add({
            targets: this.batteryG,
            y: "-=6",
            duration: 1100,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });

          // Head of the mouse — deeper inside the ruins, a separate landmark
          this.mouseHeadX = this.catX + (this.treeX - this.catX) / 2;
          this.mouseHeadY = this.gY - 2;
          this.buildGlowMarker(this.mouseHeadX, this.mouseHeadY);
          this.mouseHeadBeacon = this.buildItemBeacon(
            this.mouseHeadX,
            this.mouseHeadY,
          );
          this.mouseHeadG = this.add.graphics().setDepth(30);
          this.drawMouseHeadIcon(
            this.mouseHeadG,
            this.mouseHeadX,
            this.mouseHeadY,
            1.4,
          );
          this.tweens.add({
            targets: this.mouseHeadG,
            y: "-=6",
            duration: 1300,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });

          // Tail of the mouse — near the sleeping cat, but offset into the open field beside it
          this.mouseTailX = this.catX - 140;
          this.mouseTailY = this.gY - 2;
          this.buildGlowMarker(this.mouseTailX, this.mouseTailY);
          this.mouseTailBeacon = this.buildItemBeacon(
            this.mouseTailX,
            this.mouseTailY,
          );
          this.mouseTailG = this.add.graphics().setDepth(30);
          this.drawMouseTailIcon(
            this.mouseTailG,
            this.mouseTailX,
            this.mouseTailY,
            1.4,
          );
          this.tweens.add({
            targets: this.mouseTailG,
            y: "-=6",
            duration: 1200,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });
        }

        // Soft pulsing glow ring on the ground beneath a collectible — helps it stand out
        buildGlowMarker(x, y) {
          let g = this.add.graphics().setDepth(29);
          g.fillStyle(0xd4a850, 0.16);
          g.fillEllipse(x, y + 2, 60, 16);
          this.tweens.add({
            targets: g,
            alpha: { from: 0.4, to: 1 },
            duration: 1400,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });
          return g;
        }

        // Small floating glint above a collectible, visible from a distance,
        // hinting "something is here" without saying what it is or what to do.
        buildItemBeacon(x, y) {
          let beacon = this.add
            .text(x, y - 56, "✦", {
              fontFamily: "EB Garamond",
              fontSize: "16px",
              color: "#e8c878",
            })
            .setOrigin(0.5)
            .setDepth(31);
          this.tweens.add({
            targets: beacon,
            y: y - 64,
            alpha: { from: 0.35, to: 0.95 },
            duration: 1300,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });
          return beacon;
        }

        // ── Icon drawing helpers (graphics-based, no sprites needed) ──
        drawBatteryIcon(g, x, y, scale) {
          g.clear();
          let w = 34 * scale,
            h = 20 * scale;
          // body
          g.fillStyle(0x3a3a3a, 1);
          g.fillRoundedRect(x - w / 2, y - h - 4, w, h, 3);
          // + terminal (right, red)
          g.fillStyle(0xdd4433, 1);
          g.fillRect(x + w / 2 - 2, y - h - 4 + h / 2 - 6, 6, 12);
          g.fillRect(x + w / 2 + 1, y - h - 4 + h / 2 - 2, 4, 4);
          // - terminal (left, dark)
          g.fillStyle(0x222222, 1);
          g.fillRect(x - w / 2 - 4, y - h - 4 + h / 2 - 2, 4, 4);
          // stripe
          g.fillStyle(0xe8c860, 1);
          g.fillRect(x - w / 2 + 4, y - h - 4 + 3, w - 8, 4);
        }

        drawMotorIcon(g, x, y, scale) {
          g.clear();
          let r = 12 * scale,
            bodyY = y - r - 4;
          // cylinder body
          g.fillStyle(0x5a6072, 1);
          g.fillRoundedRect(x - r, bodyY - r, r * 2, r * 2, 4);
          // end cap highlight
          g.fillStyle(0x7a8294, 1);
          g.fillRect(x - r, bodyY - r, 5 * scale, r * 2);
          // shaft
          g.fillStyle(0xc8c8c8, 1);
          g.fillRect(x + r, bodyY - 2 * scale, 10 * scale, 4 * scale);
          // shaft tip
          g.fillStyle(0xeeeeee, 1);
          g.fillCircle(x + r + 10 * scale, bodyY, 2.5 * scale);
        }

        drawMouseBodyIcon(g, x, y, scale, flipX) {
          g.clear();
          let dir = flipX ? -1 : 1;
          let bw = 26 * scale,
            bh = 16 * scale,
            cy = y - bh / 2 - 4;
          // body (rounded blob)
          g.fillStyle(0xb8a888, 1);
          g.fillEllipse(x, cy, bw, bh);
          // ears
          g.fillStyle(0xc8b898, 1);
          g.fillEllipse(
            x - bw * 0.28 * dir,
            cy - bh * 0.55,
            8 * scale,
            8 * scale,
          );
          g.fillEllipse(
            x + bw * 0.05 * dir,
            cy - bh * 0.6,
            8 * scale,
            8 * scale,
          );
          // tail
          g.lineStyle(2, 0xb8a888, 1);
          g.beginPath();
          g.moveTo(x + bw * 0.5 * dir, cy);
          g.lineTo(x + (bw * 0.5 + 14 * scale) * dir, cy + 4 * scale);
          g.strokePath();
          // eye
          g.fillStyle(0x222222, 1);
          g.fillCircle(x - bw * 0.18 * dir, cy - 1, 1.6 * scale);
        }

        // Front half of the toy mouse — head, ears, eye, snout
        drawMouseHeadIcon(g, x, y, scale) {
          g.clear();
          let bw = 24 * scale,
            bh = 16 * scale,
            cy = y - bh / 2 - 4;
          // head/front body (half ellipse-ish blob)
          g.fillStyle(0xb8a888, 1);
          g.fillEllipse(x, cy, bw, bh);
          // ears
          g.fillStyle(0xc8b898, 1);
          g.fillEllipse(x - bw * 0.3, cy - bh * 0.55, 8 * scale, 8 * scale);
          g.fillEllipse(x + bw * 0.02, cy - bh * 0.6, 8 * scale, 8 * scale);
          // snout
          g.fillStyle(0xd8c8a8, 1);
          g.fillEllipse(x - bw * 0.55, cy + bh * 0.1, 8 * scale, 7 * scale);
          // eye
          g.fillStyle(0x222222, 1);
          g.fillCircle(x - bw * 0.2, cy - 1, 1.6 * scale);
          // nose
          g.fillStyle(0xdd6688, 1);
          g.fillCircle(x - bw * 0.62, cy + bh * 0.05, 1.4 * scale);
        }

        // Back half of the toy mouse — hindquarters + tail
        drawMouseTailIcon(g, x, y, scale) {
          g.clear();
          let bw = 22 * scale,
            bh = 15 * scale,
            cy = y - bh / 2 - 4;
          // hind body
          g.fillStyle(0xa89878, 1);
          g.fillEllipse(x, cy, bw, bh);
          // tail
          g.lineStyle(2.5 * scale, 0xa89878, 1);
          g.beginPath();
          g.moveTo(x + bw * 0.45, cy);
          g.lineTo(x + bw * 0.45 + 16 * scale, cy + 5 * scale);
          g.lineTo(x + bw * 0.45 + 22 * scale, cy - 2 * scale);
          g.strokePath();
          // rear foot stub
          g.fillStyle(0x988868, 1);
          g.fillEllipse(x - bw * 0.2, cy + bh * 0.45, 6 * scale, 4 * scale);
        }

        // ── Generic item pickup check ──
        // `descLabel` is the ambient flavor name shown when the player is near
        // but not yet close enough to interact (e.g. "Head of an electrical mouse").
        // `pickupLabel` is the short name used in the [E] prompt and notifications.
        checkItemPickup(px, py, key, itemX, pickupLabel, descLabel) {
          if (this.collected[key]) {
            this.hideItemLabel(key);
            return;
          }
          let nearRange = Math.abs(px - itemX) < 150 && py >= this.gY;
          let pickupRange = Math.abs(px - itemX) < 90 && py >= this.gY;

          if (nearRange) {
            this.showItemLabel(key, itemX, descLabel, pickupRange);
          } else {
            this.hideItemLabel(key);
          }

          if (pickupRange) {
            this.showPuzzlePrompt("[E]  Pick Up " + pickupLabel);
            if (this.puzzlePrompt) {
              this.puzzlePrompt.x = px - this.cameras.main.scrollX;
              this.puzzlePrompt.y = py - PLAYER_H - 22;
            }
            if (Phaser.Input.Keyboard.JustDown(this.eKey)) {
              this.collected[key] = true;
              this.collectedCount++;
              if (
                this.collectedCount >= 3 &&
                !this.mousePuzzleSolved &&
                !this.hintTimerStarted
              ) {
                this.hintTimerStarted = true;

                this.time.delayedCall(20000, () => {
                  if (this.collectedCount >= 3 && !this.mousePuzzleSolved) {
                    this.hintBtn.setVisible(true);

                    this.tweens.add({
                      targets: this.hintBtn,
                      alpha: { from: 0.4, to: 1 },
                      duration: 1000,
                      yoyo: true,
                      repeat: -1,
                    });
                  }
                });
              }
              if (key === "battery") {
                this.batteryG.setVisible(false);
                this.batteryBeacon.setVisible(false);
              }
              if (key === "mouseHead") {
                this.mouseHeadG.setVisible(false);
                this.mouseHeadBeacon.setVisible(false);
              }
              if (key === "mouseTail") {
                this.mouseTailG.setVisible(false);
                this.mouseTailBeacon.setVisible(false);
              }
              this.hideItemLabel(key);
              this.updateInventory();
              this.showHint(
                pickupLabel +
                  " Collected (" +
                  this.collectedCount +
                  "/3 Toy Mouse Parts)",
              );
              this.hidePuzzlePrompt();
            }
          }
        }

        // Ambient floating label above an item, shown while the player is nearby.
        // Once close enough to interact, the label switches to show the [E] prompt.
        showItemLabel(key, itemX, descLabel, canPickup) {
          if (!this.itemLabels) this.itemLabels = {};
          let itemY = this.gY - 80;
          let text = canPickup ? descLabel + "   [E] Pick up" : descLabel;
          let color = canPickup ? "#e8c878" : "#cdbfa0";

          if (this.itemLabels[key]) {
            let lbl = this.itemLabels[key];
            if (lbl._text !== text) {
              lbl.setText(text);
              lbl.setColor(color);
              lbl._text = text;
            }
            return;
          }

          let lbl = this.add
            .text(itemX - this.cameras.main.scrollX, itemY, text, {
              fontFamily: "EB Garamond",
              fontStyle: "italic",
              fontSize: "14px",
              color: color,
              backgroundColor: "#00000088",
              padding: { x: 6, y: 3 },
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(310)
            .setAlpha(0);
          lbl._text = text;
          this.itemLabels[key] = lbl;
          this.tweens.add({
            targets: lbl,
            alpha: 1,
            duration: 400,
          });
        }

        hideItemLabel(key) {
          if (this.itemLabels && this.itemLabels[key]) {
            this.itemLabels[key].destroy();
            this.itemLabels[key] = null;
          }
        }

        updateInventory() {
          if (this.inventoryText) this.inventoryText.destroy();
          if (this.collectedCount === 0) return;
          let parts = [];
          if (this.collected.battery) parts.push("🔋 Battery");
          if (this.collected.mouseHead) parts.push("🐭 Mouse Head");
          if (this.collected.mouseTail) parts.push("🐭 Mouse Tail");
          this.inventoryText = this.add
            .text(16, 16, parts.join("   "), {
              fontFamily: "EB Garamond",
              fontSize: "14px",
              color: "#7a8ea0",
              backgroundColor: "#00000099",
              padding: { x: 8, y: 5 },
            })
            .setScrollFactor(0)
            .setDepth(320);
        }

        // ── Persistent Hint button (top-right) — context-aware nudge ──
        buildHintButton() {
          this.hintBtn = this.add
            .text(W - 20, 20, "? Hint", {
              fontFamily: "EB Garamond",
              fontSize: "18px",
              color: "#7a8ea0",
              backgroundColor: "#00000099",
              padding: { x: 12, y: 8 },
            })
            .setOrigin(1, 0)
            .setScrollFactor(0)
            .setDepth(700)
            .setInteractive({ useHandCursor: true })
            .setAlpha(0.5);

          this.hintBtn.on("pointerover", () =>
            this.hintBtn.setColor("#ffffff"),
          );
          this.hintBtn.on("pointerout", () => this.hintBtn.setColor("#7a8ea0"));
          this.hintBtn.on("pointerdown", () => this.showContextHint());
        }

        // Gives the player a nudge based on current quest progress, without
        // ever stating exactly *what* to do mechanically.
        showContextHint() {
          if (this.triggered || this.puzzleOpen || this.mousePuzzleOpen) return;

          if (this.puzzleSolved) {
            this.showHint("The city calls from below.", 3200);
          } else if (this.mousePuzzleSolved) {
            this.showHint(
              "The tree feels different now. Maybe it's worth a closer look.",
            );
          } else if (this.collectedCount >= 3) {
            this.showHint("Something near the tree still remembers.", 3400);
          } else if (this.collectedCount > 0) {
            this.showHint("Fragments of a forgotten toy lie scattered.", 3600);
          } else {
            this.showHint(
              "Walk with ← → (or A/D), jump with ↑ / W / Space. Look for glowing markers on the ground — press [E] near them.",
              4200,
            );
          }
        }
        // ── Ambient fireflies scattered across the field ──
        buildFireflies() {
          if (!this.textures.exists("fireflies")) return;
          for (let i = 0; i < 10; i++) {
            let fx = Phaser.Math.Between(200, this.worldW - 200);
            let fy = this.gY - Phaser.Math.Between(20, 160);
            let fly = this.add
              .image(fx, fy, "fireflies")
              .setDisplaySize(8, 4)
              .setDepth(50)
              .setAlpha(0);
            this.tweens.add({
              targets: fly,
              alpha: { from: 0, to: Phaser.Math.FloatBetween(0.2, 0.5) },
              duration: Phaser.Math.Between(1200, 2400),
              yoyo: true,
              repeat: -1,
              delay: Phaser.Math.Between(0, 3000),
            });
            this.tweens.add({
              targets: fly,
              x: fx + Phaser.Math.Between(-60, 60),
              y: fy + Phaser.Math.Between(-40, 40),
              duration: Phaser.Math.Between(5000, 9000),
              yoyo: true,
              repeat: -1,
              ease: "Sine.InOut",
            });
          }
        }

        // Queue-based subtitle system — only one hint visible at a time, prevents overlap
        showHint(text, duration = null) {
          if (!this.hintQueue) this.hintQueue = [];

          if (duration === null) {
            duration = Math.max(2500, text.length * 65);
          }

          this.hintQueue.push({ text, duration });

          if (!this.hintActive) {
            this._playNextHint();
          }
        }

        _playNextHint() {
          if (!this.hintQueue || this.hintQueue.length === 0) {
            this.hintActive = false;
            return;
          }
          this.hintActive = true;
          let hint = this.hintQueue.shift();

          let text = hint.text;
          let duration = hint.duration;
          let t = this.add
            .text(W / 2, H - 29, text, {
              fontFamily: "EB Garamond",
              fontStyle: "italic",
              fontSize: "19px",
              color: "#ffffff",
              align: "center",
              wordWrap: { width: W - 300 },
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(610)
            .setAlpha(0);
          this.tweens.add({
            targets: t,
            alpha: 1,
            duration: 700,
            onComplete: () => {
              this.time.delayedCall(duration, () => {
                this.tweens.add({
                  targets: t,
                  alpha: 0,
                  duration: 600,
                  onComplete: () => {
                    t.destroy();
                    this._playNextHint();
                  },
                });
              });
            },
          });
        }

        showPuzzlePrompt(text) {
          text = text || "[E]  Restore the circuit";
          let sx = this.player.x - this.cameras.main.scrollX;
          let sy = this.player.y - PLAYER_H - 22;
          if (this.puzzlePrompt) {
            if (this.puzzlePrompt.text !== text)
              this.puzzlePrompt.setText(text);
            return;
          }
          this.puzzlePrompt = this.add
            .text(sx, sy, text, {
              fontFamily: "EB Garamond",
              fontSize: "14px",
              color: "#aabbcc",
              backgroundColor: "#00000099",
              padding: { x: 8, y: 4 },
            })
            .setOrigin(0.5)
            .setDepth(320)
            .setScrollFactor(0);
        }

        hidePuzzlePrompt() {
          if (this.puzzlePrompt) {
            this.puzzlePrompt.destroy();
            this.puzzlePrompt = null;
          }
        }

        // ════════════════════════════════════════════════════════════
        // PIPE PUZZLE — 5x5 grid, 1 source (green), connect to all targets (yellow)
        // ════════════════════════════════════════════════════════════
        openPuzzle() {
          this.puzzleOpen = true;
          this.hidePuzzlePrompt();

          const COLS = 5,
            ROWS = 5,
            CELL = 72,
            BOARD_W = COLS * CELL,
            BOARD_H = ROWS * CELL,
            originX = W / 2 - BOARD_W / 2,
            originY = H / 2 - BOARD_H / 2;

          this._puzzleGeom = { originX, originY, BOARD_W, BOARD_H, CELL };
          this.puzzleZones = [];

          // Direction bit flags
          const N = 1,
            E = 2,
            S = 4,
            Wd = 8;
          const OPP = { 1: 4, 4: 1, 2: 8, 8: 2 };
          const DX = { 1: 0, 2: 1, 4: 0, 8: -1 };
          const DY = { 1: -1, 2: 0, 4: 1, 8: 0 };

          // Fixed solution layout (row, col) — connections each cell needs when SOLVED
          // S at (2,0), targets at (0,4) and (4,4) and (4,0)
          // Hand-authored paths so every cell on a path has exactly the right connections.
          let solved = {};
          const key = (r, c) => r + "_" + c;
          const addConn = (r, c, dir) => {
            solved[key(r, c)] = (solved[key(r, c)] || 0) | dir;
          };
          const link = (r1, c1, r2, c2) => {
            if (r2 === r1 - 1) {
              addConn(r1, c1, N);
              addConn(r2, c2, S);
            } else if (r2 === r1 + 1) {
              addConn(r1, c1, S);
              addConn(r2, c2, N);
            } else if (c2 === c1 + 1) {
              addConn(r1, c1, E);
              addConn(r2, c2, Wd);
            } else if (c2 === c1 - 1) {
              addConn(r1, c1, Wd);
              addConn(r2, c2, E);
            }
          };

          // Source
          const startCell = { r: 2, c: 0 };
          // Targets
          const targets = [
            { r: 0, c: 4 },
            { r: 4, c: 4 },
            { r: 4, c: 0 },
          ];

          // Path 1: (2,0) -> (2,2) -> (0,2) -> (0,4)
          link(2, 0, 2, 1);
          link(2, 1, 2, 2);
          link(2, 2, 1, 2);
          link(1, 2, 0, 2);
          link(0, 2, 0, 3);
          link(0, 3, 0, 4);

          // Path 2: (2,2) -> (3,2) -> (4,2) -> (4,3) -> (4,4)
          link(2, 2, 3, 2);
          link(3, 2, 4, 2);
          link(4, 2, 4, 3);
          link(4, 3, 4, 4);

          // Path 3: (2,1) -> (3,1) -> (4,1) -> (4,0)
          link(2, 1, 3, 1);
          link(3, 1, 4, 1);
          link(4, 1, 4, 0);

          // Build cell list (only cells that are part of the solution carry pipes)
          this.puzzleCells = [];
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              let conn = solved[key(r, c)];
              if (!conn) continue;
              let isStart = r === startCell.r && c === startCell.c;
              let isTarget = targets.some((t) => t.r === r && t.c === c);
              // Random initial rotation for interior pipes; start/target stubs must
              // stay fixed (rot 0) so their single connector points the correct
              // pre-authored direction toward the rest of the circuit.
              let rot = isStart || isTarget ? 0 : Phaser.Math.Between(1, 3);
              this.puzzleCells.push({
                r,
                c,
                solvedConn: conn,
                rot,
                isStart,
                isTarget,
              });
            }
          }

          // ── Overlay backdrop ──
          this.puzzleOverlay = this.add
            .graphics()
            .setScrollFactor(0)
            .setDepth(700);
          this.puzzleOverlay.fillStyle(0x000000, 0.78);
          this.puzzleOverlay.fillRect(0, 0, W, H);

          this.puzzleContainer = this.add
            .container(0, 0)
            .setScrollFactor(0)
            .setDepth(701);

          // Title
          let title = this.add
            .text(W / 2, originY - 50, "Restore the Circuit", {
              fontFamily: "Cinzel",
              fontSize: "26px",
              color: "#c8a050",
            })
            .setOrigin(0.5);
          this.puzzleContainer.add(title);

          let subtitle = this.add
            .text(
              W / 2,
              originY - 20,
              "Click a pipe to rotate it. Connect the green source to every yellow node.",
              {
                fontFamily: "EB Garamond",
                fontStyle: "italic",
                fontSize: "15px",
                color: "#8a9aac",
              },
            )
            .setOrigin(0.5);
          this.puzzleContainer.add(subtitle);

          // Board background grid
          let boardBg = this.add.graphics();
          boardBg.fillStyle(0x10141c, 0.92);
          boardBg.fillRoundedRect(
            originX - 14,
            originY - 14,
            BOARD_W + 28,
            BOARD_H + 28,
            10,
          );
          boardBg.lineStyle(2, 0x2a3850, 1);
          for (let r = 0; r <= ROWS; r++) {
            boardBg.lineBetween(
              originX,
              originY + r * CELL,
              originX + BOARD_W,
              originY + r * CELL,
            );
          }
          for (let c = 0; c <= COLS; c++) {
            boardBg.lineBetween(
              originX + c * CELL,
              originY,
              originX + c * CELL,
              originY + BOARD_H,
            );
          }
          this.puzzleContainer.add(boardBg);

          // Helper: draw a pipe cell graphic given rotated connection bitmask
          const drawPipe = (g, conn, cx, cy, color) => {
            g.clear();
            let half = CELL / 2;
            let thick = 12;
            g.fillStyle(color, 1);
            // center hub
            g.fillCircle(cx, cy, thick * 0.8);
            if (conn & N) g.fillRect(cx - thick / 2, cy - half, thick, half);
            if (conn & S) g.fillRect(cx - thick / 2, cy, thick, half);
            if (conn & E) g.fillRect(cx, cy - thick / 2, half, thick);
            if (conn & Wd) g.fillRect(cx - half, cy - thick / 2, half, thick);
          };

          const rotateConn = (conn, steps) => {
            // rotate bits clockwise: N->E->S->W->N
            let order = [N, E, S, Wd];
            let res = 0;
            for (let i = 0; i < 4; i++) {
              if (conn & order[i]) {
                res |= order[(i + steps) % 4];
              }
            }
            return res;
          };

          // Render each cell
          this.puzzleCells.forEach((cell) => {
            let cx = originX + cell.c * CELL + CELL / 2;
            let cy = originY + cell.r * CELL + CELL / 2;

            let g = this.add.graphics();
            this.puzzleContainer.add(g);
            cell.gfx = g;

            const redraw = () => {
              let curConn = rotateConn(cell.solvedConn, cell.rot);
              cell.curConn = curConn;
              let color = cell.isStart
                ? 0x33dd66
                : cell.isTarget
                  ? 0xe0c050
                  : 0xc87830;
              drawPipe(g, curConn, cx, cy, color);
            };
            redraw();
            cell._redraw = redraw;

            // Node marker for start/target
            if (cell.isStart) {
              let ring = this.add.graphics();
              ring.lineStyle(3, 0x33ee66, 1);
              ring.strokeCircle(cx, cy, 16);
              this.puzzleContainer.add(ring);
            } else if (cell.isTarget) {
              let ring = this.add.graphics();
              ring.fillStyle(0xf0d060, 1);
              ring.fillCircle(cx, cy, 11);
              this.puzzleContainer.add(ring);
              cell.targetRing = ring;
            }

            // Click zone (start and target end-stubs are fixed, not rotatable)
            if (!cell.isStart && !cell.isTarget) {
              let zone = this.add
                .rectangle(cx, cy, CELL - 6, CELL - 6, 0xffffff, 0.001)
                .setScrollFactor(0)
                .setDepth(705)
                .setInteractive({ useHandCursor: true });
              this.puzzleZones.push(zone);
              zone.on("pointerdown", () => {
                cell.rot = (cell.rot + 1) % 4;
                redraw();
                this.checkPuzzleSolved(targets, key);
              });
              zone.on("pointerover", () => {
                g.setAlpha(0.7);
              });
              zone.on("pointerout", () => {
                g.setAlpha(1);
              });
            }
          });

          // Close button
          let closeBtn = this.add
            .text(originX + BOARD_W + 30, originY - 40, "✕", {
              fontFamily: "EB Garamond",
              fontSize: "26px",
              color: "#8a9aac",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(705)
            .setInteractive({ useHandCursor: true });
          closeBtn.on("pointerdown", () => this.closePuzzle());
          closeBtn.on("pointerover", () => closeBtn.setColor("#ffffff"));
          closeBtn.on("pointerout", () => closeBtn.setColor("#8a9aac"));
          this.puzzleZones.push(closeBtn);

          this.puzzleSolvedText = null;

          // store for solved-check
          this._puzzleTargetsRef = targets;
          this._puzzleKeyFn = key;
          this._puzzleStartCell = startCell;
        }

        // BFS from start through connected pipe cells; solved if all targets reached
        checkPuzzleSolved(targets, key) {
          let cellMap = {};
          this.puzzleCells.forEach((c) => (cellMap[key(c.r, c.c)] = c));

          let start = this.puzzleCells.find((c) => c.isStart);
          let visited = new Set();
          let queue = [start];
          visited.add(key(start.r, start.c));

          const DIRS = [
            { bit: 1, dr: -1, dc: 0, opp: 4 }, // N
            { bit: 2, dr: 0, dc: 1, opp: 8 }, // E
            { bit: 4, dr: 1, dc: 0, opp: 1 }, // S
            { bit: 8, dr: 0, dc: -1, opp: 2 }, // W
          ];

          while (queue.length) {
            let cur = queue.shift();
            DIRS.forEach((d) => {
              if (cur.curConn & d.bit) {
                let nr = cur.r + d.dr,
                  nc = cur.c + d.dc;
                let nb = cellMap[key(nr, nc)];
                if (nb && !visited.has(key(nr, nc)) && nb.curConn & d.opp) {
                  visited.add(key(nr, nc));
                  queue.push(nb);
                }
              }
            });
          }

          let allConnected = targets.every((t) => visited.has(key(t.r, t.c)));

          // Visual feedback on targets
          let geom = this._puzzleGeom;
          this.puzzleCells.forEach((c) => {
            if (c.isTarget && c.targetRing) {
              c.targetRing.clear();
              c.targetRing.fillStyle(
                visited.has(key(c.r, c.c)) ? 0x55ff88 : 0xf0d060,
                1,
              );
              let cx = geom.originX + c.c * geom.CELL + geom.CELL / 2;
              let cy = geom.originY + c.r * geom.CELL + geom.CELL / 2;
              c.targetRing.fillCircle(cx, cy, 11);
            }
          });

          if (allConnected && !this.puzzleSolved) {
            this.solvePuzzle();
          }
        }

        solvePuzzle() {
          this.puzzleSolved = true;

          // Flash success text
          let geom = this._puzzleGeom;
          let okText = this.add
            .text(
              W / 2,
              geom.originY + geom.BOARD_H + 36,
              "Circuit restored.",
              {
                fontFamily: "EB Garamond",
                fontStyle: "italic",
                fontSize: "20px",
                color: "#7adf9a",
              },
            )
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(702)
            .setAlpha(0);
          this.puzzleContainer.add(okText);
          this.tweens.add({ targets: okText, alpha: 1, duration: 500 });

          this.cameras.main.flash(380, 120, 255, 160, false);

          this.time.delayedCall(1200, () => {
            this.closePuzzle();
            this.showHint("The hum returns. The way is open.");
            this.glowIntensity = 1;
          });
        }

        closePuzzle() {
          this.puzzleOpen = false;
          if (this.puzzleOverlay) {
            this.puzzleOverlay.destroy();
            this.puzzleOverlay = null;
          }
          if (this.puzzleContainer) {
            this.puzzleContainer.destroy();
            this.puzzleContainer = null;
          }
          if (this.puzzleZones) {
            this.puzzleZones.forEach((z) => z.destroy());
            this.puzzleZones = null;
          }
          this.puzzleCells = null;
        }

        // ════════════════════════════════════════════════════════════
        // TOY MOUSE PUZZLE — drag Battery / Switch / Motor into 3 loop
        // slots. Correct closed-circuit order: Battery → Switch → Motor.
        // ════════════════════════════════════════════════════════════
        drawSwitchIcon(g, x, y, scale) {
          g.clear();
          let w = 30 * scale;
          // base plate
          g.fillStyle(0x4a4a4a, 1);
          g.fillRoundedRect(x - w / 2, y - 8 * scale, w, 14 * scale, 3);
          // lever (open position)
          g.lineStyle(4 * scale, 0xcccccc, 1);
          g.beginPath();
          g.moveTo(x - w / 2 + 5 * scale, y - 1 * scale);
          g.lineTo(x + w / 2 - 7 * scale, y - 10 * scale);
          g.strokePath();
          // pivot + contact dots
          g.fillStyle(0xdd9933, 1);
          g.fillCircle(x - w / 2 + 5 * scale, y - 1 * scale, 2.5 * scale);
          g.fillCircle(x + w / 2 - 5 * scale, y - 1 * scale, 2.5 * scale);
        }

        openMousePuzzle() {
          this.mousePuzzleOpen = true;
          this.hidePuzzlePrompt();

          const CX = W / 2,
            CY = H / 2 - 20;
          const BOX_W = 96,
            BOX_H = 70;

          // Layout (mirrors the hand-sketched recipe):
          //   LEFT column = outputs (start empty, fill in as combos complete)
          //     outBody  -> mouse body (head+tail combined)
          //     outFinal -> final toy (mouse body + battery combined) = SOLVED
          //   RIGHT column = input slots the player drags collected parts into
          //     headSlot, tailSlot  -> combine into outBody
          //     batterySlot          -> combines with outBody into outFinal
          const outFinal = {
            x: CX - 230,
            y: CY - 90,
            w: BOX_W + 20,
            h: BOX_H + 10,
            filled: null,
          };
          const outBody = {
            x: CX - 230,
            y: CY + 90,
            w: BOX_W,
            h: BOX_H,
            filled: null,
          };
          const headSlot = {
            x: CX + 140,
            y: CY - 110,
            w: BOX_W,
            h: BOX_H,
            filled: null,
          };
          const tailSlot = {
            x: CX + 280,
            y: CY - 110,
            w: BOX_W,
            h: BOX_H,
            filled: null,
          };
          const batterySlot = {
            x: CX + 210,
            y: CY + 90,
            w: BOX_W + 20,
            h: BOX_H + 10,
            filled: null,
          };

          this.mpOverlay = this.add.graphics().setScrollFactor(0).setDepth(700);
          this.mpOverlay.fillStyle(0x000000, 0.85);
          this.mpOverlay.fillRect(0, 0, W, H);

          this.mpElements = [];

          let title = this.add
            .text(CX, CY - 200, "A Forgotten Toy", {
              fontFamily: "Cinzel",
              fontSize: "26px",
              color: "#c8a050",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(701);
          this.mpElements.push(title);

          let subtitle = this.add
            .text(CX, CY - 168, "Drag each part into place.", {
              fontFamily: "EB Garamond",
              fontStyle: "italic",
              fontSize: "15px",
              color: "#8a9aac",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(701);
          this.mpElements.push(subtitle);

          // Draw box outlines + "+" connectors
          const drawBox = (box) => {
            let g = this.add.graphics().setScrollFactor(0).setDepth(700);
            g.lineStyle(2, 0xd96a78, 0.85);
            g.strokeRoundedRect(
              box.x - box.w / 2,
              box.y - box.h / 2,
              box.w,
              box.h,
              8,
            );
            this.mpElements.push(g);
            box.outlineG = g;
          };
          [outFinal, outBody, headSlot, tailSlot, batterySlot].forEach(drawBox);

          // Small labels identifying each slot — shown only while empty
          const addSlotLabel = (box, text) => {
            let lbl = this.add
              .text(box.x, box.y + box.h / 2 + 14, text, {
                fontFamily: "EB Garamond",
                fontStyle: "italic",
                fontSize: "13px",
                color: "#9aa8b8",
                align: "center",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(701);
            this.mpElements.push(lbl);
            box.label = lbl;
          };
          addSlotLabel(headSlot, "Head");
          addSlotLabel(tailSlot, "Tail");
          addSlotLabel(outBody, "Mouse Body");
          addSlotLabel(batterySlot, "Battery");
          addSlotLabel(outFinal, "Complete Toy");

          // Step guide text — explains the two-stage recipe
          let step1 = this.add
            .text(
              (headSlot.x + tailSlot.x) / 2,
              headSlot.y - headSlot.h / 2 - 28,
              "Step 1 — Combine Head + Tail",
              {
                fontFamily: "EB Garamond",
                fontStyle: "italic",
                fontSize: "14px",
                color: "#d96a78",
              },
            )
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(701);
          this.mpElements.push(step1);

          let step2 = this.add
            .text(
              (outBody.x + batterySlot.x) / 2,
              outBody.y + outBody.h / 2 + 38,
              "Step 2 — Add the Battery",
              {
                fontFamily: "EB Garamond",
                fontStyle: "italic",
                fontSize: "14px",
                color: "#d96a78",
              },
            )
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(701);
          this.mpElements.push(step2);

          // "+" between head and tail
          let plus1 = this.add
            .text((headSlot.x + tailSlot.x) / 2, headSlot.y, "+", {
              fontFamily: "EB Garamond",
              fontSize: "28px",
              color: "#d96a78",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(701);
          this.mpElements.push(plus1);

          // "+" between outBody and batterySlot
          let plus2 = this.add
            .text(
              (outBody.x + batterySlot.x) / 2,
              (outBody.y + batterySlot.y) / 2,
              "+",
              {
                fontFamily: "EB Garamond",
                fontSize: "28px",
                color: "#d96a78",
              },
            )
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(701);
          this.mpElements.push(plus2);

          this.mpSlots = { outFinal, outBody, headSlot, tailSlot, batterySlot };

          // Tray of draggable items along the bottom — the player's collected parts
          const trayY = CY + 250;
          const trayItems = ["mouseHead", "mouseTail", "battery"];
          this.mpDraggables = [];
          let shuffled = Phaser.Utils.Array.Shuffle(trayItems.slice());
          shuffled.forEach((type, i) => {
            let tx = CX - 130 + i * 130;
            let g = this.add.graphics().setScrollFactor(0).setDepth(703);
            this.drawMousePuzzleIcon(g, type, tx, trayY, 1.6);
            this.mpElements.push(g);

            // Invisible draggable handle (robust hit-testing)
            let handle = this.add
              .rectangle(tx, trayY, 90, 90, 0xffffff, 0.001)
              .setScrollFactor(0)
              .setDepth(704)
              .setInteractive({ useHandCursor: true, draggable: true });
            this.mpElements.push(handle);

            let item = {
              type,
              g,
              handle,
              homeX: tx,
              homeY: trayY,
              x: tx,
              y: trayY,
              placedSlot: null,
            };
            this.mpDraggables.push(item);

            handle.on("drag", (pointer, dragX, dragY) => {
              item.x = dragX;
              item.y = dragY;
              handle.x = dragX;
              handle.y = dragY;
              this.drawMousePuzzleIcon(g, type, dragX, dragY, 1.6);
            });

            handle.on("dragend", () => {
              this.handleMouseItemDrop(item);
            });

            this.input.setDraggable(handle);
          });

          // Close button
          let closeBtn = this.add
            .text(CX + 320, CY - 200, "✕", {
              fontFamily: "EB Garamond",
              fontSize: "26px",
              color: "#8a9aac",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(705)
            .setInteractive({ useHandCursor: true });
          closeBtn.on("pointerdown", () => this.closeMousePuzzle());
          closeBtn.on("pointerover", () => closeBtn.setColor("#ffffff"));
          closeBtn.on("pointerout", () => closeBtn.setColor("#8a9aac"));
          this.mpElements.push(closeBtn);
        }

        // Returns true if a point is within a box's bounds
        _inBox(x, y, box) {
          return (
            Math.abs(x - box.x) < box.w / 2 + 16 &&
            Math.abs(y - box.y) < box.h / 2 + 16
          );
        }

        handleMouseItemDrop(item) {
          let slots = this.mpSlots;
          let target = null;

          // mouseHead can only go in headSlot; mouseTail only in tailSlot;
          // battery only in batterySlot; mouseBody only stays in outBody —
          // wrong-slot drops bounce back with a spark.
          if (
            item.type === "mouseHead" &&
            this._inBox(item.x, item.y, slots.headSlot)
          )
            target = "headSlot";
          else if (
            item.type === "mouseTail" &&
            this._inBox(item.x, item.y, slots.tailSlot)
          )
            target = "tailSlot";
          else if (
            item.type === "battery" &&
            this._inBox(item.x, item.y, slots.batterySlot)
          )
            target = "batterySlot";
          else if (
            item.type === "mouseBody" &&
            this._inBox(item.x, item.y, slots.outBody)
          )
            target = "outBody";
          else if (
            this._inBox(item.x, item.y, slots.headSlot) ||
            this._inBox(item.x, item.y, slots.tailSlot) ||
            this._inBox(item.x, item.y, slots.batterySlot) ||
            this._inBox(item.x, item.y, slots.outBody)
          ) {
            // dropped on a slot, but the wrong type for it
            this.sparkAt(item.x, item.y);
            this.showHint("bzzt...");
          }

          // vacate old slot if any
          if (item.placedSlot) {
            slots[item.placedSlot].filled = null;
            if (slots[item.placedSlot].label)
              slots[item.placedSlot].label.setVisible(true);
          }

          // mouseBody has nowhere else to go — it always belongs in outBody
          if (!target && item.type === "mouseBody") target = "outBody";

          if (target) {
            let slot = slots[target];
            slot.filled = item;
            item.placedSlot = target;
            item.x = slot.x;
            item.y = slot.y;
            item.handle.x = slot.x;
            item.handle.y = slot.y;
            if (slot.label) slot.label.setVisible(false);
          } else {
            item.placedSlot = null;
            item.x = item.homeX;
            item.y = item.homeY;
            item.handle.x = item.homeX;
            item.handle.y = item.homeY;
          }

          this.drawMousePuzzleIcon(item.g, item.type, item.x, item.y, 1.6);
          this.checkMousePuzzle();
        }

        sparkAt(x, y) {
          let spark = this.add.graphics().setScrollFactor(0).setDepth(704);
          spark.fillStyle(0xffaa33, 0.9);
          for (let i = 0; i < 5; i++) {
            spark.fillCircle(
              x + Phaser.Math.Between(-14, 14),
              y + Phaser.Math.Between(-14, 14),
              Phaser.Math.Between(1, 3),
            );
          }
          this.mpElements.push(spark);
          this.tweens.add({
            targets: spark,
            alpha: 0,
            duration: 350,
            onComplete: () => spark.destroy(),
          });
          this.cameras.main.shake(180, 0.006);
        }

        drawMousePuzzleIcon(g, type, x, y, scale) {
          if (type === "battery")
            this.drawBatteryIcon(g, x, y + 12 * scale, scale);
          else if (type === "mouseHead") this.drawMouseHeadIcon(g, x, y, scale);
          else if (type === "mouseTail") this.drawMouseTailIcon(g, x, y, scale);
          else if (type === "mouseBody") this.drawMouseBodyIcon(g, x, y, scale);
          else if (type === "finalToy") {
            this.drawMouseBodyIcon(g, x, y, scale);
            // small spark to indicate it's now powered
